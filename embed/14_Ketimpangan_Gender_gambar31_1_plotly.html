<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 31 (1) — Perbedaan Distribusi Upah per Jam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(980px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(17px, 2.1vw, 25px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 28px 32px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
    }
    .plot-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--deep-purple);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    #plotly-g31-1 { width: 100%; height: 420px; }
    .legend-row {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--deep-purple);
    }
    .legend-swatch {
      width: 32px;
      height: 14px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 31.</div>
      <h1>Kesenjangan Upah Berdasarkan Gender</h1>
    </header>

    <div class="plot-wrap">
      <div class="plot-title">Perbedaan Distribusi Upah per Jam</div>
      <div id="plotly-g31-1"></div>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-swatch" style="background:rgba(93,63,211,0.55);"></div>
          Laki-laki
        </div>
        <div class="legend-item">
          <div class="legend-swatch" style="background:rgba(240,171,0,0.65);"></div>
          Perempuan
        </div>
      </div>
    </div>

    <div class="source">Sumber: Sakernas Agustus 2025, diolah oleh peneliti</div>
  </div>

  <script>
    /* ── Generate KDE-like density curves (Gaussian approximation) ── */
    function gauss(x, mu, sigma) {
      return Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
    }

    const xs = [];
    for (let x = -5; x <= 15; x += 0.05) xs.push(parseFloat(x.toFixed(2)));

    /* Laki-laki: wider distribution, peak ~4 at x≈9.1 */
    const yLaki = xs.map(x => parseFloat((4.05 * gauss(x, 9.1, 0.75)).toFixed(4)));

    /* Perempuan: narrower distribution, peak ~6.1 at x≈9.55 */
    const yPerempuan = xs.map(x => parseFloat((6.10 * gauss(x, 9.55, 0.38)).toFixed(4)));

    /* ── Trace 1: Laki-laki (behind) ── */
    const traceLaki = {
      type: "scatter",
      mode: "lines",
      x: xs,
      y: yLaki,
      fill: "tozeroy",
      fillcolor: "rgba(93,63,211,0.40)",
      line: { color: "rgba(93,63,211,0.85)", width: 2 },
      name: "Laki-laki",
      hovertemplate: "Log upah: <b>%{x:.2f}</b><br>Density: <b>%{y:.3f}</b><extra>Laki-laki</extra>",
      showlegend: false
    };

    /* ── Trace 2: Perempuan (in front) ── */
    const tracePerempuan = {
      type: "scatter",
      mode: "lines",
      x: xs,
      y: yPerempuan,
      fill: "tozeroy",
      fillcolor: "rgba(240,171,0,0.55)",
      line: { color: "rgba(210,148,0,0.9)", width: 2 },
      name: "Perempuan",
      hovertemplate: "Log upah: <b>%{x:.2f}</b><br>Density: <b>%{y:.3f}</b><extra>Perempuan</extra>",
      showlegend: false
    };

    /* ── Layout ── */
    const layout = {
      margin: { t: 20, r: 30, b: 70, l: 65, pad: 4 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor:  "rgba(0,0,0,0)",
      font: { family: "Manrope" },
      showlegend: false,
      xaxis: {
        range: [-5, 15],
        dtick: 5,
        tickfont: { size: 12, color: "rgba(47,36,95,0.75)" },
        gridcolor: "rgba(93,63,211,0.1)",
        zeroline: true,
        zerolinecolor: "rgba(93,63,211,0.2)",
        zerolinewidth: 1,
        title: {
          text: "Log upah per jam",
          font: { size: 12, color: "rgba(47,36,95,0.65)" },
          standoff: 14
        }
      },
      yaxis: {
        range: [0, 7],
        dtick: 2,
        tickfont: { size: 12, color: "rgba(47,36,95,0.75)" },
        gridcolor: "rgba(93,63,211,0.1)",
        zeroline: true,
        zerolinecolor: "rgba(93,63,211,0.2)",
        zerolinewidth: 1,
        title: {
          text: "Density",
          font: { size: 12, color: "rgba(47,36,95,0.65)" },
          standoff: 12
        }
      },
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g31-1", [traceLaki, tracePerempuan], layout,
      { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
