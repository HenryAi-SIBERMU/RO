<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              purple: '#7B36A7', // Approximate purple from image
              yellow: '#F3D24F', // Approximate yellow from image
              dark: '#111827',
              gray: '#F3F4F6'

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-utilities">
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FAFAFA;
      background-image: 
        linear-gradient(to right, #f0f0f0 1px, transparent 1px),
        linear-gradient(to bottom, #f0f0f0 1px, transparent 1px);
      background-size: 100px 100px;
    }
    
    /* Curved connecting lines - arch shape (∩) using border-radius 50% trick */
    .connection-line {
      position: absolute;
      border: 2px solid transparent;
      border-top-color: #6B7280;
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
    }
    
    /* Connecting Card 1 (Bottom Left) to Card 2 (Middle) - arch on top */
    .line-1, .line-3 {
      top: 75px;
      left: 200px;
      width: 140px;
      height: 80px;
    }

    /* Connecting Card 2 (Middle) to Card 3 (Top Right) - arch on top */
    .line-2, .line-4 {
      top: 10px;
      left: 460px;
      width: 140px;
      height: 80px;
    }

      background-position: left center;
      background-size: 50%;
    }
    .card-pattern-hand {
      background-image: url('data:image/svg+xml;utf8,<svg fill="none" height="60" viewbox="0 0 24 24" width="60" xmlns="http://www.w3.org/2000/svg"><path d="M21.99 8c0-.72-.37-1.35-.94-1.7L12 1 2.95 6.3C2.38 6.65 2 7.28 2 8v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2l-.01-10zM12 13L3.74 7.84 12 3l8.26 4.84L12 13z" fill="rgba(255,255,255,0.1)"></path></svg>');
