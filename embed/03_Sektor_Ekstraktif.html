<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambar 4 — Sektor Ekstraktif sebagai Sumber Kekayaan Elite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #fff;
  height: 100%;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.wrap {
  width: 100%;
  max-width: 860px;
  background: #fff;
}

/* ── Header label ── */
.header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.g-tag {
  background: #6b21c8;
  color: #fff;
  font-size: 12.5px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 4px;
  flex-shrink: 0;
}
.g-title {
  font-size: 16px;
  font-weight: 700;
  color: #6b21c8;
  line-height: 1.3;
}

/* ── Main row ── */
.main {
  display: flex;
  align-items: stretch;
  min-height: 200px;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

/* ── Illustration ── */
.illus {
  flex: 0 0 44%;
  background: linear-gradient(160deg, #e8f5e9 0%, #f3e5f5 60%, #e3f2fd 100%);
  padding: 18px 14px 28px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px 6px;
  width: 100%;
}
.e-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.e-icon {
  font-size: 32px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
}
.e-label {
  font-size: 8px;
  color: #444;
  font-weight: 600;
  text-align: center;
  letter-spacing: 0.2px;
}
.src {
  position: absolute;
  bottom: 7px;
  left: 10px;
  font-size: 8.5px;
  color: #6b21c8;
  font-weight: 600;
}

/* ── Stat ── */
.stat {
  flex: 0 0 28%;
  background: #7c3aed;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stat-num {
  font-size: 76px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -3px;
  line-height: 1;
}

/* ── Description ── */
.desc {
  flex: 1;
  background: #fff;
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-left: 1px solid #f0e6ff;
}
.desc-title {
  font-size: 15px;
  font-weight: 800;
  color: #1a1a2e;
  margin-bottom: 10px;
  line-height: 1.4;
}
.desc-body {
  font-size: 13px;
  color: #444;
  line-height: 1.75;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span class="g-tag">Gambar 4.</span>
    <span class="g-title">Sektor Ekstraktif sebagai Sumber Kekayaan Elite</span>
  </div>

  <div class="main">
    <!-- Illustration -->
    <div class="illus">
      <div class="emoji-grid">
        <div class="e-item"><span class="e-icon">⛏️</span><span class="e-label">Pertambangan</span></div>
        <div class="e-item"><span class="e-icon">🏗️</span><span class="e-label">Konstruksi</span></div>
        <div class="e-item"><span class="e-icon">🌴</span><span class="e-label">Kelapa Sawit</span></div>
        <div class="e-item"><span class="e-icon">🚜</span><span class="e-label">Pertanian</span></div>
        <div class="e-item"><span class="e-icon">🛢️</span><span class="e-label">Migas</span></div>
        <div class="e-item"><span class="e-icon">🪵</span><span class="e-label">Kehutanan</span></div>
      </div>
      <div class="src">Ketimpangan Ekonomi Indonesia 2026</div>
    </div>

    <!-- Stat -->
    <div class="stat">
      <span class="stat-num">58%</span>
    </div>

    <!-- Description -->
    <div class="desc">
      <div class="desc-title">Dominasi Sektor Ekstraktif</div>
      <div class="desc-body">
        Kekayaan 50 orang terkaya bersumber dari bisnis ekstraktif yang mengeksploitasi sumber daya alam
      </div>
    </div>
  </div>
</div>
</body>
</html>
