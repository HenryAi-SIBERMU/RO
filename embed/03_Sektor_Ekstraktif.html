<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambar 4 — Sektor Ekstraktif sebagai Sumber Kekayaan Elite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 16px;
}

.card {
  width: 100%;
  max-width: 860px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
}

/* ── Label ── */
.label-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.label-tag {
  background: #7234ad;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 4px;
  white-space: nowrap;
}
.label-title {
  font-size: 17px;
  font-weight: 700;
  color: #4a1a8c;
}

/* ── Body ── */
.body {
  display: flex;
  align-items: stretch;
  gap: 0;
  border-radius: 12px;
  overflow: hidden;
  min-height: 220px;
}

/* ── Illustration ── */
.illus {
  flex: 1.4;
  background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%);
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.icons-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
}
.icon-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.icon-item svg {
  width: 38px;
  height: 38px;
}
.icon-label {
  font-size: 9px;
  color: #555;
  text-align: center;
  font-weight: 600;
}
.source-tag {
  position: absolute;
  bottom: 8px;
  left: 12px;
  font-size: 9px;
  color: #7234ad;
  font-weight: 700;
}

/* ── Stat ── */
.stat-box {
  flex: 0 0 180px;
  background: #7234ad;
  display: flex;
  align-items: center;
  justify-content: center;
}
.stat-num {
  font-size: 72px;
  font-weight: 900;
  color: #fff;
  letter-spacing: -2px;
  line-height: 1;
}

/* ── Text ── */
.text-box {
  flex: 1.2;
  background: #f9f5ff;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-left: 4px solid #7234ad;
}
.text-title {
  font-size: 16px;
  font-weight: 800;
  color: #1a0040;
  margin-bottom: 10px;
  line-height: 1.3;
}
.text-body {
  font-size: 13.5px;
  color: #333;
  line-height: 1.7;
}
</style>
</head>
<body>
<div class="card">
  <div class="label-row">
    <span class="label-tag">Gambar 4.</span>
    <span class="label-title">Sektor Ekstraktif sebagai Sumber Kekayaan Elite</span>
  </div>

  <div class="body">
    <!-- Illustration -->
    <div class="illus">
      <div class="icons-grid">
        <!-- Mining -->
        <div class="icon-item">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="36" width="30" height="16" rx="3" fill="#f5a623"/>
            <rect x="6" y="44" width="52" height="8" rx="4" fill="#e8891a"/>
            <circle cx="14" cy="54" r="6" fill="#555"/>
            <circle cx="14" cy="54" r="3" fill="#ccc"/>
            <circle cx="44" cy="54" r="6" fill="#555"/>
            <circle cx="44" cy="54" r="3" fill="#ccc"/>
            <rect x="28" y="20" width="6" height="18" rx="2" fill="#bbb"/>
            <polygon points="24,20 44,20 38,8 30,8" fill="#f5a623"/>
            <rect x="34" y="28" width="22" height="10" rx="2" fill="#f5a623"/>
          </svg>
          <span class="icon-label">Pertambangan</span>
        </div>
        <!-- Coal -->
        <div class="icon-item">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="32" cy="44" rx="24" ry="10" fill="#555"/>
            <ellipse cx="32" cy="38" rx="24" ry="10" fill="#777"/>
            <ellipse cx="32" cy="32" rx="24" ry="10" fill="#666"/>
            <ellipse cx="32" cy="32" rx="14" ry="5" fill="#999"/>
          </svg>
          <span class="icon-label">Batubara</span>
        </div>
        <!-- Palm Oil -->
        <div class="icon-item">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="28" y="30" width="8" height="28" rx="3" fill="#8B5E3C"/>
            <path d="M32 30 Q20 22 12 10 Q22 14 32 26" fill="#4CAF50"/>
            <path d="M32 30 Q44 22 52 10 Q42 14 32 26" fill="#388E3C"/>
            <path d="M32 28 Q22 18 18 6 Q28 12 32 24" fill="#66BB6A"/>
            <path d="M32 28 Q42 18 46 6 Q36 12 32 24" fill="#4CAF50"/>
            <ellipse cx="32" cy="58" rx="10" ry="4" fill="#6D4C41"/>
          </svg>
          <span class="icon-label">Kelapa Sawit</span>
        </div>
        <!-- Agriculture -->
        <div class="icon-item">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="34" width="36" height="14" rx="3" fill="#e74c3c"/>
            <rect x="2" y="42" width="56" height="10" rx="5" fill="#c0392b"/>
            <circle cx="12" cy="54" r="7" fill="#333"/>
            <circle cx="12" cy="54" r="3.5" fill="#aaa"/>
            <circle cx="46" cy="54" r="7" fill="#333"/>
            <circle cx="46" cy="54" r="3.5" fill="#aaa"/>
            <rect x="36" y="26" width="8" height="12" rx="2" fill="#27ae60"/>
            <rect x="30" y="22" width="20" height="8" rx="2" fill="#2ecc71"/>
          </svg>
          <span class="icon-label">Pertanian</span>
        </div>
        <!-- Oil/Gas -->
        <div class="icon-item">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="26" y="10" width="12" height="44" rx="3" fill="#999"/>
            <rect x="20" y="8" width="24" height="8" rx="2" fill="#bbb"/>
            <rect x="18" y="50" width="28" height="8" rx="2" fill="#bbb"/>
            <rect x="38" y="26" width="16" height="6" rx="2" fill="#999"/>
            <rect x="10" y="26" width="16" height="6" rx="2" fill="#999"/>
            <polygon points="32,4 28,10 36,10" fill="#f5a623"/>
            <ellipse cx="32" cy="20" rx="6" ry="3" fill="#f5a623" opacity="0.7"/>
          </svg>
          <span class="icon-label">Migas</span>
        </div>
        <!-- Forest -->
        <div class="icon-item">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="32,6 10,38 54,38" fill="#2ecc71"/>
            <polygon points="32,18 12,44 52,44" fill="#27ae60"/>
            <rect x="26" y="44" width="12" height="16" rx="2" fill="#8B5E3C"/>
            <rect x="4" y="52" width="56" height="6" rx="3" fill="#7CB342" opacity="0.5"/>
          </svg>
          <span class="icon-label">Kehutanan</span>
        </div>
      </div>
      <div class="source-tag">Ketimpangan Ekonomi Indonesia 2026</div>
    </div>

    <!-- Stat -->
    <div class="stat-box">
      <span class="stat-num">58%</span>
    </div>

    <!-- Text -->
    <div class="text-box">
      <div class="text-title">Dominasi Sektor Ekstraktif</div>
      <div class="text-body">
        Kekayaan 50 orang terkaya bersumber dari bisnis ekstraktif yang mengeksploitasi sumber daya alam
      </div>
    </div>
  </div>
</div>
</body>
</html>
