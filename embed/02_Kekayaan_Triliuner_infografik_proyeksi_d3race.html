<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3 Race (Dummy) — Proyeksi Kekayaan 50 Triliuner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <style>
    :root {
      --bg-main: #1d0d2f;
      --bg-card: #2b1050;
      --purple: #6c27ce;
      --yellow: #f9c646;
      --green: #36cfc9;
      --pink: #ff6bbb;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at top left, #32104f 0%, #14051f 65%, #0b0214 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 56px 16px 72px;
    }
    main {
      width: min(960px, 100%);
      background: linear-gradient(135deg, rgba(108,39,206,0.52), rgba(29,13,47,0.95));
      border-radius: 32px;
      padding: 48px 56px 52px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(10, 2, 30, 0.55);
    }
    main::before,
    main::after {
      content: "";
      position: absolute;
      left: 0;
      width: 120px;
      height: 280px;
      background: rgba(255,255,255,0.12);
      border-top-right-radius: 48px;
      border-bottom-right-radius: 48px;
      filter: blur(0.5px);
    }
    main::before {
      top: -40px;
      opacity: 0.7;
    }
    main::after {
      bottom: -120px;
      opacity: 0.5;
    }
    header {
      position: relative;
      z-index: 2;
      margin-bottom: 28px;
    }
    .chart-tag {
      display: inline-flex;
      padding: 12px 24px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 16px 0 8px;
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 800;
    }
    p.subtitle {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    #chart {
      position: relative;
      z-index: 2;
      margin-top: 36px;
    }
    svg {
      width: 100%;
      height: 420px;
      border-radius: 24px;
      background: rgba(12, 4, 22, 0.55);
      backdrop-filter: blur(6px);
      padding: 24px 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .ticker {
      position: absolute;
      bottom: 24px;
      right: 32px;
      font-size: 54px;
      font-weight: 800;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.04em;
    }
    .source {
      margin-top: 28px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      z-index: 2;
      position: relative;
    }
    svg .avatar-initial {
      fill: rgba(255,255,255,0.92);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    svg .avatar-name {
      fill: rgba(255,255,255,0.9);
      font-weight: 700;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="chart-tag">Bar Chart Race — Dummy Data</span>
      <h1>Simulasi Bar Chart Race — Kekayaan 50 Triliuner (Dummy)</h1>
      <p class="subtitle">animasi dummy — data ilustratif</p>
    </header>
    <section id="chart">
      <div class="ticker" id="ticker">2019</div>
      <svg></svg>
    </section>
    <div class="source">Data dummy untuk demonstrasi. Adaptasikan ke data resmi sebelum dipublikasikan.</div>
  </main>

  <script>
    const svg = d3.select('svg');
    const bounds = svg.node().getBoundingClientRect();
    const width = bounds.width || 820;
    const height = bounds.height || 420;

    svg
      .attr('width', width)
      .attr('height', height)
      .attr('viewBox', `0 0 ${width} ${height}`)
      .attr('preserveAspectRatio', 'xMidYMid meet');

    const margin = { top: 24, right: 160, bottom: 30, left: 240 };
    const chartWidth = width - margin.left - margin.right;
    const chartHeight = height - margin.top - margin.bottom;

    const g = svg
      .append('g')
      .attr('transform', `translate(${margin.left}, ${margin.top})`);

    const palette = d3.scaleOrdinal()
      .range(['#f9c646', '#6c27ce', '#36cfc9', '#ff6bbb', '#fb8b24', '#4cc9f0']);

    const avatarMeta = {
      'Hartono Family': { initial: 'HF', color: '#f3a712' },
      'Prajogo Pangestu': { initial: 'PP', color: '#6c27ce' },
      'Widjaja Family': { initial: 'WF', color: '#1bc9c3' },
      'Barito Group': { initial: 'BG', color: '#ff6bbb' },
      'Djarum Ventures': { initial: 'DV', color: '#fb8b24' }
    };

    const frames = [
      { year: 2019, values: { 'Hartono Family': 2400, 'Prajogo Pangestu': 1900, 'Widjaja Family': 1700, 'Barito Group': 1450, 'Djarum Ventures': 1200 } },
      { year: 2020, values: { 'Hartono Family': 2600, 'Prajogo Pangestu': 2050, 'Widjaja Family': 1800, 'Barito Group': 1600, 'Djarum Ventures': 1360 } },
      { year: 2021, values: { 'Hartono Family': 2950, 'Prajogo Pangestu': 2400, 'Widjaja Family': 2100, 'Barito Group': 1800, 'Djarum Ventures': 1500 } },
      { year: 2022, values: { 'Hartono Family': 3250, 'Prajogo Pangestu': 2800, 'Widjaja Family': 2300, 'Barito Group': 2050, 'Djarum Ventures': 1680 } },
      { year: 2023, values: { 'Hartono Family': 3900, 'Prajogo Pangestu': 3300, 'Widjaja Family': 2600, 'Barito Group': 2350, 'Djarum Ventures': 1820 } },
      { year: 2024, values: { 'Hartono Family': 4500, 'Prajogo Pangestu': 3800, 'Widjaja Family': 2920, 'Barito Group': 2600, 'Djarum Ventures': 2100 } },
      { year: 2025, values: { 'Hartono Family': 4900, 'Prajogo Pangestu': 4180, 'Widjaja Family': 3120, 'Barito Group': 2780, 'Djarum Ventures': 2360 } }
    ];

    const names = Array.from(
      new Set(frames.flatMap(frame => Object.keys(frame.values)))
    );

    palette.domain(names);

    const y = d3.scaleBand()
      .domain(names)
      .range([0, chartHeight])
      .padding(0.22);

    const x = d3.scaleLinear()
      .domain([0, d3.max(frames, frame => d3.max(Object.values(frame.values)))])
      .nice()
      .range([0, chartWidth]);

    const yAxis = g.append('g')
      .attr('class', 'y-axis')
      .attr('font-family', 'Plus Jakarta Sans')
      .attr('font-size', 14)
      .attr('fill', 'rgba(255,255,255,0.85)');

    const barsGroup = g.append('g');
    const labelGroup = g.append('g').attr('fill', '#fff');
    const avatarGroup = g.append('g').attr('class', 'avatars');
    const AVATAR_OFFSET_X = -180;

    const formatValue = d3.format(',');

    function render(frame) {
      const entries = names.map(name => ({
        name,
        value: frame.values[name] ?? 0
      })).sort((a, b) => b.value - a.value);

      y.domain(entries.map(d => d.name));
      x.domain([0, d3.max(entries, d => d.value)]).nice();

      const t = g.transition().duration(1100).ease(d3.easeCubicOut);

      const avatars = avatarGroup.selectAll('g.avatar').data(entries, d => d.name);

      const avatarEnter = avatars.enter()
        .append('g')
        .attr('class', 'avatar')
        .attr('transform', d => `translate(${AVATAR_OFFSET_X}, ${y(d.name) + y.bandwidth() / 2})`)
        .attr('opacity', 0);

      avatarEnter.append('circle')
        .attr('class', 'avatar-circle')
        .attr('r', 20)
        .attr('fill', d => (avatarMeta[d.name]?.color ?? palette(d.name)))
        .attr('stroke', 'rgba(255,255,255,0.35)')
        .attr('stroke-width', 2)
        .attr('filter', 'drop-shadow(0 8px 18px rgba(0,0,0,0.25))');

      avatarEnter.append('text')
        .attr('class', 'avatar-initial')
        .attr('font-size', 11)
        .attr('text-anchor', 'middle')
        .attr('alignment-baseline', 'central')
        .text(d => (avatarMeta[d.name]?.initial ?? d.name.split(/\s+/).map(n => n[0]).join('').slice(0, 2)));

      avatarEnter.append('text')
        .attr('class', 'avatar-name')
        .attr('x', 32)
        .attr('font-size', 14)
        .attr('alignment-baseline', 'central')
        .text(d => d.name);

      avatars.merge(avatarEnter)
        .transition(t)
        .attr('opacity', 1)
        .attr('transform', d => `translate(${AVATAR_OFFSET_X}, ${y(d.name) + y.bandwidth() / 2})`);

      avatars.exit()
        .transition(t)
        .attr('opacity', 0)
        .remove();

      const bars = barsGroup.selectAll('rect').data(entries, d => d.name);

      bars.enter()
        .append('rect')
        .attr('x', 0)
        .attr('y', d => y(d.name))
        .attr('height', y.bandwidth())
        .attr('fill', d => palette(d.name))
        .attr('rx', y.bandwidth() / 2)
        .attr('width', 0)
        .merge(bars)
        .transition(t)
        .attr('y', d => y(d.name))
        .attr('width', d => x(d.value));

      bars.exit()
        .transition(t)
        .attr('width', 0)
        .remove();

      const labels = labelGroup.selectAll('text').data(entries, d => d.name);

      labels.enter()
        .append('text')
        .attr('x', d => x(d.value) + 12)
        .attr('y', d => y(d.name) + y.bandwidth() / 2)
        .attr('alignment-baseline', 'middle')
        .attr('font-size', 15)
        .attr('font-weight', 700)
        .attr('fill', 'rgba(255,255,255,0.92)')
        .text(d => `Rp${formatValue(d.value)} T`)
        .merge(labels)
        .transition(t)
        .attr('x', d => x(d.value) + 12)
        .attr('y', d => y(d.name) + y.bandwidth() / 2)
        .text(d => `Rp${formatValue(d.value)} T`);

      labels.exit()
        .transition(t)
        .attr('x', 0)
        .remove();

      yAxis.transition(t)
        .call(d3.axisLeft(y).tickSize(0).tickFormat(() => ""));

      yAxis.selectAll('path').attr('display', 'none');
      yAxis.selectAll('line').attr('display', 'none');

      document.getElementById('ticker').textContent = frame.year;
    }

    let frameIndex = 0;
    render(frames[frameIndex]);

    setInterval(() => {
      frameIndex = (frameIndex + 1) % frames.length;
      render(frames[frameIndex]);
    }, 2200);
  </script>
</body>
</html>
