<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gambar 7 - Total Harta Pejabat Publik Kabinet</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-main: #4b2c8b;
      --purple-dark: #352065;
      --yellow-main: #f3d24f;
      --text-dark: #231f3f;
      --gray-bg: #f2f1f6;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: var(--text-dark);
      padding: 48px 24px 64px;
    }
    .infographic {
      position: relative;
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 32px;
      padding: 48px 56px 60px;
      overflow: hidden;
    }
    .infographic::before,
    .infographic::after {
      content: "";
      position: absolute;
      left: 0;
      width: 118px;
      height: 280px;
      background: var(--gray-bg);
      border-top-right-radius: 48px;
      border-bottom-right-radius: 48px;
      opacity: 0.9;
      z-index: 0;
    }
    .infographic::before {
      top: 0;
    }
    .infographic::after {
      bottom: -120px;
      opacity: 0.7;
    }
    header {
      position: relative;
      z-index: 1;
    }
    .chart-title {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .chart-tag {
      display: inline-block;
      padding: 10px 20px;
      background: var(--purple-main);
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      border-radius: 8px;
      letter-spacing: 0.01em;
    }
    .chart-heading {
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      margin: 0;
      color: var(--purple-dark);
    }
    .subtitle {
      margin: 20px 0 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(35, 31, 63, 0.7);
    }
    .chart-wrapper {
      position: relative;
      margin-top: 36px;
      padding-bottom: 32px;
      z-index: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 420px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      margin-top: 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }
    .legend-dot--purple {
      background: var(--purple-main);
    }
    .legend-dot--yellow {
      background: var(--yellow-main);
    }
    .source-badge {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      padding: 12px 18px;
      border-radius: 18px;
      background: #f7d96a;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }
    @media (max-width: 768px) {
      body {
        padding: 32px 16px 48px;
      }
      .infographic {
        padding: 40px 32px 52px;
      }
      .chart-wrapper {
        margin-top: 28px;
      }
      canvas {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <main class="infographic">
    <header>
      <div class="chart-title">
        <span class="chart-tag">Gambar 7.</span>
        <h1 class="chart-heading">Total Harta Pejabat Publik Kabinet (2019–2025)</h1>
      </div>
      <p class="subtitle">Dalam miliar rupiah</p>
    </header>

    <section class="chart-wrapper">
      <canvas id="chartGambar7" aria-label="Total harta pejabat publik dan jumlah pejabat per tahun" role="img"></canvas>
    </section>

    <section class="legend">
      <div class="legend-item">
        <span class="legend-dot legend-dot--purple"></span>
        <span>Total Harta Pejabat Kabinet</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot--yellow"></span>
        <span>Jumlah Pejabat Publik</span>
      </div>
    </section>

    <div class="source-badge">
      Sumber: Data Laporan Harta Kekayaan Penyelenggara Negara (2026), diolah oleh peneliti
    </div>
  </main>

  <script>
    const ctx = document.getElementById('chartGambar7');

    const tahun = [2019, 2020, 2021, 2022, 2023, 2024, 2025];
    const totalHarta = [13601, 16468, 24059, 28038, 21500, 30405, 30340];
    const jumlahPejabat = [57, 59, 58, 59, 61, 140, 143];

    const formatterRupiah = new Intl.NumberFormat('id-ID');

    const labelPlugin = {
      id: 'valueLabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();

        const barMeta = chart.getDatasetMeta(0);
        barMeta.data.forEach((bar, index) => {
          if (!bar || !Number.isFinite(totalHarta[index])) return;
          const value = `Rp${formatterRupiah.format(totalHarta[index])}`;
          ctx.font = '600 13px "Inter"';
          ctx.fillStyle = '#352065';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(value, bar.x, bar.y - 10);
        });

        const lineMeta = chart.getDatasetMeta(1);
        lineMeta.data.forEach((point, index) => {
          if (!point) return;
          const value = formatterRupiah.format(jumlahPejabat[index]);
          ctx.font = '600 12px "Inter"';
          ctx.fillStyle = '#b58800';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(value, point.x, point.y - 18);
        });
      }
    };

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: tahun,
        datasets: [
          {
            type: 'bar',
            label: 'Total Harta Pejabat Kabinet',
            data: totalHarta,
            backgroundColor: '#4b2c8b',
            hoverBackgroundColor: '#5d36ab',
            borderColor: '#4b2c8b',
            borderWidth: 1,
            borderRadius: 0,
            borderSkipped: false,
            barPercentage: 0.48,
            categoryPercentage: 0.68,
            order: 1,
            yAxisID: 'y'
          },
          {
            type: 'line',
            label: 'Jumlah Pejabat Publik',
            data: jumlahPejabat,
            borderColor: '#f3d24f',
            backgroundColor: '#f3d24f',
            pointBackgroundColor: '#f3d24f',
            pointBorderColor: '#dbae1c',
            pointRadius: 8,
            pointHoverRadius: 9,
            pointBorderWidth: 2,
            tension: 0.3,
            borderWidth: 3,
            yAxisID: 'y1',
            order: 0
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: {
            top: 32,
            right: 48,
            bottom: 20,
            left: 16
          }
        },
        scales: {
          x: {
            grid: {
              display: false
            },
            border: {
              display: true,
              color: '#231f3f',
              width: 1
            },
            ticks: {
              color: '#3b335a',
              font: {
                family: 'Inter',
                weight: '600'
              }
            }
          },
          y: {
            position: 'left',
            beginAtZero: true,
            suggestedMax: 32000,
            grid: {
              color: '#e3e3ed',
              lineWidth: 1
            },
            border: {
              display: false
            },
            ticks: {
              padding: 10,
              color: '#615a7f',
              font: {
                family: 'Inter',
                weight: '600'
              },
              callback: (value) => `Rp${formatterRupiah.format(value)}`
            }
          },
          y1: {
            position: 'right',
            beginAtZero: true,
            suggestedMax: 150,
            grid: {
              drawOnChartArea: false,
              drawTicks: true
            },
            border: {
              display: false
            },
            ticks: {
              padding: 10,
              color: '#b58800',
              font: {
                family: 'Inter',
                weight: '600'
              }
            }
          }
        },
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            backgroundColor: '#1f1b33',
            padding: 12,
            cornerRadius: 8,
            titleFont: {
              family: 'Inter',
              size: 13,
              weight: '700'
            },
            bodyFont: {
              family: 'Inter',
              size: 12,
              weight: '500'
            },
            callbacks: {
              label: (context) => {
                if (context.dataset.type === 'bar') {
                  return `${context.dataset.label}: Rp${formatterRupiah.format(context.parsed.y)}`;
                }
                return `${context.dataset.label}: ${formatterRupiah.format(context.parsed.y)} pejabat`;
              }
            }
          }
        }
      },
      plugins: [labelPlugin]
    });
  </script>
</body>
</html>
