<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 28 — Kurva Produktivitas &amp; Nilai Ekonomi Ibu WFH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(980px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(17px, 2.1vw, 25px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .h1-sub {
      display: block;
      font-size: 0.78em;
      font-weight: 600;
      color: rgba(55,32,109,0.6);
      margin-top: 3px;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 28px 32px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
    }
    #plotly-g28 { width: 100%; height: 480px; }
    .legend-row {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--deep-purple);
    }
    .legend-line {
      width: 32px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 28.</div>
      <h1>
        Kurva Produktivitas &amp; Nilai Ekonomi Ibu WFH
        <span class="h1-sub">(Integrasi Kerja Domestik + Kerja Formal)</span>
      </h1>
    </header>

    <div class="plot-wrap">
      <div id="plotly-g28"></div>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-line" style="background:#5d3fd3;"></div>
          Akumulasi Jam Kerja (Jam/Hari)
        </div>
        <div class="legend-item">
          <div class="legend-line" style="background:#f0ab00;"></div>
          Akumulasi Nilai Ekonomi (Juta Rp/Bulan)
        </div>
      </div>
    </div>

    <div class="source">Sumber: Diolah oleh penulis (2026)</div>
  </div>

  <script>
    const cats = ["Kerja Domestik", "Care Work", "Manajerial", "Kerja Formal (WFH)"];

    /* Values: jam kerja (left y) */
    const jamData   = [4, 9, 10, 18];
    const jamLabels = ["4 Jam", "9 Jam", "10 Jam", "18 Jam"];

    /* Values: nilai ekonomi in Juta Rp (right y) */
    const ekoData   = [0.87, 6.15, 7.05, 17.03];
    const ekoLabels = ["Rp 0.87 Juta", "Rp 6.15 Juta", "Rp 7.05 Juta", "Rp 17.03 Juta"];

    /* ── Trace 1: Purple line (left y) ── */
    const traceJam = {
      type: "scatter",
      mode: "lines+markers",
      x: cats,
      y: jamData,
      yaxis: "y",
      line: { color: "#5d3fd3", width: 3 },
      marker: { color: "#5d3fd3", size: 9, line: { color: "#fff", width: 2 } },
      hovertemplate: "%{x}<br><b>%{y} Jam</b><extra></extra>",
      showlegend: false
    };

    /* ── Trace 2: Gold/yellow line (right y) ── */
    const traceEko = {
      type: "scatter",
      mode: "lines+markers",
      x: cats,
      y: ekoData,
      yaxis: "y2",
      line: { color: "#f0ab00", width: 3 },
      marker: { color: "#f0ab00", size: 9, line: { color: "#fff", width: 2 } },
      hovertemplate: "%{x}<br><b>Rp %{y:.2f} Juta</b><extra></extra>",
      showlegend: false
    };

    /* ── Trace 3: Batas Kerja Standar reference line ── */
    const traceRef = {
      type: "scatter",
      mode: "lines",
      x: ["Kerja Domestik", "Kerja Formal (WFH)"],
      y: [8, 8],
      yaxis: "y",
      line: { color: "rgba(220,80,80,0.65)", width: 1.5, dash: "dash" },
      hoverinfo: "skip",
      showlegend: false
    };

    /* ── Annotations ── */
    const annotations = [
      /* Reference line label */
      {
        x: "Kerja Domestik", y: 8, yref: "y",
        text: "<i>Batas Kerja Standar (8 Jam)</i>",
        showarrow: false,
        font: { color: "rgba(200,60,60,0.75)", size: 11, family: "Manrope" },
        xanchor: "left",
        yanchor: "bottom",
        yshift: 5,
        xshift: 4
      }
    ];

    /* Jam labels — above each point */
    jamData.forEach((v, i) => {
      annotations.push({
        x: cats[i], y: v, yref: "y",
        text: `<b>${jamLabels[i]}</b>`,
        showarrow: false,
        font: { color: "#3d28a0", size: 12, family: "Manrope" },
        xanchor: "center",
        yanchor: "bottom",
        yshift: 9
      });
    });

    /* Ekonomi labels — below each gold point (skip first if too crowded) */
    ekoData.forEach((v, i) => {
      annotations.push({
        x: cats[i], y: v, yref: "y2",
        text: ekoLabels[i],
        showarrow: false,
        font: { color: "#9a6d00", size: 11, family: "Manrope" },
        xanchor: "center",
        yanchor: "top",
        yshift: -9
      });
    });

    /* ── Layout ── */
    const layout = {
      margin: { t: 30, r: 110, b: 80, l: 75, pad: 4 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor:  "rgba(0,0,0,0)",
      font: { family: "Manrope" },
      showlegend: false,
      xaxis: {
        tickfont: { size: 12, color: "rgba(47,36,95,0.8)" },
        gridcolor: "rgba(55,32,109,0.09)",
        title: {
          text: "Komponen Pekerjaan Ibu WFH",
          font: { size: 12, color: "rgba(47,36,95,0.65)" },
          standoff: 16
        }
      },
      yaxis: {
        range: [0, 21],
        dtick: 5,
        tickfont: { size: 12, color: "#5d3fd3" },
        gridcolor: "rgba(93,63,211,0.1)",
        title: {
          text: "Akumulasi Jam Kerja (Jam/Hari)",
          font: { size: 12, color: "#5d3fd3" },
          standoff: 12
        },
        zeroline: true,
        zerolinecolor: "rgba(93,63,211,0.2)",
        zerolinewidth: 1
      },
      yaxis2: {
        overlaying: "y",
        side: "right",
        range: [0, 20],
        tickvals: [0, 2.5, 5.0, 7.5, 10.0, 12.5, 15.0, 17.5],
        ticktext: ["Rp 0", "Rp 2.5M", "Rp 5.0M", "Rp 7.5M", "Rp 10.0M", "Rp 12.5M", "Rp 15.0M", "Rp 17.5M"],
        tickfont: { size: 12, color: "#c8960a" },
        gridcolor: "rgba(0,0,0,0)",
        title: {
          text: "Akumulasi Nilai Ekonomi (Juta Rp/Bulan)",
          font: { size: 12, color: "#c8960a" },
          standoff: 14
        },
        zeroline: false
      },
      annotations: annotations,
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g28", [traceJam, traceEko, traceRef], layout,
      { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
