<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gambar 17</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;font-family:"Manrope",sans-serif;background:radial-gradient(circle at 14% 18%,rgba(93,63,211,.12),transparent 55%),radial-gradient(circle at 86% 12%,rgba(242,181,68,.12),transparent 60%),#f7f4ff}
.card{width:min(1160px,96vw);background:#fff;border-radius:26px;border:1px solid rgba(70,48,138,.2);box-shadow:0 32px 70px -34px rgba(40,26,84,.35);padding:40px 44px 48px;position:relative;overflow:hidden}
.card::after{content:"";position:absolute;inset:0;background:linear-gradient(140deg,rgba(93,63,211,.06),transparent 45%),linear-gradient(315deg,rgba(242,181,68,.05),transparent 58%);pointer-events:none}
header{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;gap:20px;margin-bottom:28px}
.badge{background:#5d3fd3;color:#fff;padding:11px 30px;border-radius:0 18px 18px 0;font-weight:800;letter-spacing:.04em;box-shadow:0 18px 28px -16px rgba(93,63,211,.65);margin-left:-44px}
h1{margin:0;font-size:clamp(22px,2.8vw,32px);color:#37206d;font-weight:800;line-height:1.25}
.dw{background:rgba(248,246,255,.95);border-radius:22px;border:1px solid rgba(93,63,211,.14);padding:16px 10px;position:relative;z-index:1;overflow-x:auto}
.dw svg{width:100%;height:auto;display:block}
.source{margin-top:28px;text-align:center;font-size:13px;font-weight:600;color:#513c86;background:#fcefd5;border-radius:16px;padding:14px 18px;border:1px solid rgba(240,193,95,.45);position:relative;z-index:1}
.legend-item{display:flex;align-items:center;gap:12px;padding:12px 14px}
.node{cursor:pointer;transition:transform 0.25s ease-out;transform-origin:center}
.node rect{transition:filter 0.28s ease,stroke-width 0.28s ease,fill 0.28s ease}
.node text{transition:fill 0.24s ease,letter-spacing 0.24s ease}
.node.active{transform:translateY(-6px)}
.node.active rect{filter:drop-shadow(0 14px 26px rgba(70,49,145,.26));stroke-width:2.4}
.node:not(.node-light).active text{fill:#2e1d63;letter-spacing:0.22px}
.node-light text{fill:#fff}
.node-light.active rect{fill:#6f51f5}
.flow-link{transition:stroke 0.24s ease,stroke-width 0.24s ease,opacity 0.24s ease;opacity:0.86}
.flow-link.active{stroke:#472abc;stroke-width:2.3;opacity:1}
.arrow-label{pointer-events:auto;cursor:pointer;transition:fill 0.24s ease,font-weight 0.24s ease,opacity 0.24s ease;opacity:0.88}
.arrow-label.active{fill:#2f1d63;font-weight:600;opacity:1}
.tooltip-bubble{position:absolute;min-width:120px;max-width:220px;padding:10px 14px;border-radius:16px;background:rgba(255,255,255,0.95);border:1px solid rgba(93,63,211,0.18);color:#3b2d78;font-size:12px;font-weight:700;box-shadow:0 16px 32px rgba(47,31,92,0.25);transform:translate(-50%,-32px) scale(0.94);opacity:0;pointer-events:none;transition:opacity 0.22s ease,transform 0.22s ease;z-index:5}
.tooltip-bubble.visible{opacity:1;transform:translate(-50%,-46px) scale(1)}
@media (max-width:900px){.card{padding:32px 26px 40px}}
</style>
</head>

<div class="source">Sumber: Diolah oleh peneliti</div>
</div>
<script>
  const tooltip = document.getElementById("tooltip");
  const nodes = Array.from(document.querySelectorAll(".node"));
  const flows = Array.from(document.querySelectorAll(".flow-link"));
  const labels = Array.from(document.querySelectorAll(".arrow-label"));
  let activeId = null;

  const nodesById = new Map(nodes.map(n => [n.dataset.id, n]));
  const flowsByKey = new Map(flows.map(f => [f.dataset.flow, f]));
  const labelsByKey = new Map(labels.map(l => [l.dataset.flow, l]));

  function clearActive() {
    nodes.forEach(n => n.classList.remove("active"));
    flows.forEach(f => f.classList.remove("active"));
    labels.forEach(l => l.classList.remove("active"));
  }

  function showTooltip(evt, text) {
    if (!text) {
      tooltip.classList.remove("visible");
      return;
    }
    tooltip.textContent = text;
    const bounds = evt.currentTarget.getBoundingClientRect();
    const parentBounds = tooltip.parentElement.getBoundingClientRect();
    const x = bounds.left + bounds.width / 2 - parentBounds.left;
    const y = bounds.top - parentBounds.top;
    tooltip.style.left = `${x}px`;
    tooltip.style.top = `${y}px`;
    tooltip.classList.add("visible");
  }

  function handleFocus(targetNode) {
    const tip = targetNode.dataset.tip;
    const outgoing = flows.filter(f => f.dataset.from === targetNode.dataset.id);
    const incoming = flows.filter(f => f.dataset.to === targetNode.dataset.id);
    clearActive();
    targetNode.classList.add("active");
    outgoing.concat(incoming).forEach(flow => {
      flow.classList.add("active");
      const label = labelsByKey.get(flow.dataset.flow);
      if (label) label.classList.add("active");
    });
    showTooltip({ currentTarget: targetNode, preventDefault(){} }, tip);
  }

  nodes.forEach(node => {
    node.addEventListener("mouseenter", evt => {
      activeId = node.dataset.id;
      handleFocus(node);
      showTooltip(evt, node.dataset.tip);
    });
    node.addEventListener("mouseleave", () => {
      activeId = null;
      clearActive();
      tooltip.classList.remove("visible");
    });
    node.addEventListener("focus", () => handleFocus(node));
    node.addEventListener("blur", () => {
      if (activeId === node.dataset.id) return;
      clearActive();
      tooltip.classList.remove("visible");
    });
    node.addEventListener("keydown", evt => {
      if (evt.key === "Enter" || evt.key === " ") {
        evt.preventDefault();
        const tip = node.dataset.tip;
        tooltip.textContent = tip;
        tooltip.style.left = `${evt.currentTarget.getBoundingClientRect().left - tooltip.parentElement.getBoundingClientRect().left + evt.currentTarget.getBBox().width / 2}px`;
        tooltip.style.top = `${evt.currentTarget.getBoundingClientRect().top - tooltip.parentElement.getBoundingClientRect().top}px`;
        tooltip.classList.toggle("visible");
      }
    });
  });

  labels.forEach(label => {
    label.addEventListener("mouseenter", evt => {
      const flow = flowsByKey.get(label.dataset.flow);
      const fromNode = nodesById.get(flow.dataset.from);
      clearActive();
      label.classList.add("active");
      flow.classList.add("active");
      if (fromNode) fromNode.classList.add("active");
      showTooltip(evt, label.dataset.tip);
    });
    label.addEventListener("mouseleave", () => {
      clearActive();
      tooltip.classList.remove("visible");
    });
  });

  flows.forEach(flow => {
    flow.addEventListener("mouseenter", evt => {
      clearActive();
      flow.classList.add("active");
      const fromNode = nodesById.get(flow.dataset.from);
      const toNode = nodesById.get(flow.dataset.to);
      const label = labelsByKey.get(flow.dataset.flow);
      if (fromNode) fromNode.classList.add("active");
      if (toNode) toNode.classList.add("active");
      if (label) label.classList.add("active");
      showTooltip(evt, flow.dataset.tip);
    });
    flow.addEventListener("mouseleave", () => {
      clearActive();
      tooltip.classList.remove("visible");
    });
  });

  document.addEventListener("click", evt => {
    if (!evt.target.closest("svg")) {
      clearActive();
      tooltip.classList.remove("visible");
    }
  });
</script>
</body>
