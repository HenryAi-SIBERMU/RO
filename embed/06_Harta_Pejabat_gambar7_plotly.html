<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gambar 7 - Plotly</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-main: #4b2c8b;
      --purple-dark: #352065;
      --yellow-main: #f3d24f;
      --text-dark: #231f3f;
      --gray-bg: #f2f1f6;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #ffffff;
      color: var(--text-dark);
      padding: 48px 24px 64px;
    }
    main {
      position: relative;
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 32px;
      padding: 48px 56px 60px;
      overflow: hidden;
    }
    main::before,
    main::after {
      content: "";
      position: absolute;
      left: 0;
      width: 118px;
      height: 280px;
      background: var(--gray-bg);
      border-top-right-radius: 48px;
      border-bottom-right-radius: 48px;
      opacity: 0.9;
      z-index: 0;
    }
    main::after {
      bottom: -120px;
      opacity: 0.7;
    }
    header {
      position: relative;
      z-index: 1;
    }
    .chart-title {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .chart-tag {
      padding: 10px 20px;
      background: var(--purple-main);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      border-radius: 8px;
    }
    h1 {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      color: var(--purple-dark);
    }
    .subtitle {
      margin: 20px 0 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(35, 31, 63, 0.7);
    }
    .chart-container {
      position: relative;
      z-index: 1;
      margin-top: 36px;
    }
    #plotlyChart {
      width: 100%;
      height: 420px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      margin-top: 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      position: relative;
      z-index: 1;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }
    .legend-dot--purple {
      background: var(--purple-main);
    }
    .legend-dot--yellow {
      background: var(--yellow-main);
    }
    .source-badge {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      padding: 12px 18px;
      border-radius: 18px;
      background: #f7d96a;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 768px) {
      body {
        padding: 32px 16px 48px;
      }
      main {
        padding: 40px 32px 52px;
      }
      #plotlyChart {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="chart-title">
        <span class="chart-tag">Gambar 7.</span>
        <h1>Total Harta Pejabat Publik Kabinet (2019–2025)</h1>
      </div>
      <p class="subtitle">Dalam miliar rupiah</p>
    </header>

    <section class="chart-container">
      <div id="plotlyChart" role="img" aria-label="Plotly chart total harta pejabat publik dan jumlah pejabat"></div>
    </section>

    <section class="legend">
      <div class="legend-item">
        <span class="legend-dot legend-dot--purple"></span>
        <span>Total Harta Pejabat Kabinet</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot--yellow"></span>
        <span>Jumlah Pejabat Publik</span>
      </div>
    </section>

    <div class="source-badge">
      Sumber: Data Laporan Harta Kekayaan Penyelenggara Negara (2026), diolah oleh peneliti
    </div>
  </main>

  <script>
    const tahun = [2019, 2020, 2021, 2022, 2023, 2024, 2025];
    const totalHarta = [13601, 16468, 24059, 28038, 21500, 30405, 30340];
    const jumlahPejabat = [57, 59, 58, 59, 61, 140, 143];

    const barTrace = {
      type: 'bar',
      x: tahun,
      y: totalHarta,
      name: 'Total Harta Pejabat Kabinet',
      marker: {
        color: '#4b2c8b',
        line: { color: '#4b2c8b', width: 1 }
      },
      text: totalHarta.map((v) => `Rp${new Intl.NumberFormat('id-ID').format(v)}`),
      textposition: 'outside',
      textfont: {
        family: 'Inter',
        size: 13,
        color: '#352065',
        weight: '600'
      },
      cliponaxis: false,
      hovertemplate: '<b>%{x}</b><br>Total Harta: Rp%{y:,.0f}<extra></extra>'
    };

    const lineTrace = {
      type: 'scatter',
      mode: 'lines+markers+text',
      x: tahun,
      y: jumlahPejabat,
      name: 'Jumlah Pejabat Publik',
      yaxis: 'y2',
      line: {
        color: '#f3d24f',
        width: 3
      },
      marker: {
        size: 16,
        color: '#f3d24f',
        line: { color: '#dbae1c', width: 2 }
      },
      text: jumlahPejabat.map((v) => new Intl.NumberFormat('id-ID').format(v)),
      textposition: 'top center',
      textfont: {
        family: 'Inter',
        size: 12,
        color: '#b58800',
        weight: '600'
      },
      hovertemplate: '<b>%{x}</b><br>Jumlah Pejabat: %{y:,.0f}<extra></extra>'
    };

    const layout = {
      margin: { l: 60, r: 80, t: 40, b: 60 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      bargap: 0.4,
      bargroupgap: 0.06,
      xaxis: {
        tickfont: { family: 'Inter', size: 14, color: '#3b335a' },
        showgrid: false,
        linecolor: '#231f3f',
        linewidth: 1,
        mirror: true
      },
      yaxis: {
        title: '',
        tickfont: { family: 'Inter', size: 13, color: '#615a7f' },
        tickprefix: 'Rp',
        separatethousands: true,
        showgrid: true,
        gridcolor: '#e3e3ed',
        gridwidth: 1,
        zeroline: false
      },
      yaxis2: {
        title: '',
        overlaying: 'y',
        side: 'right',
        showgrid: false,
        tickfont: { family: 'Inter', size: 13, color: '#b58800' },
        rangemode: 'tozero'
      },
      showlegend: false,
      hoverlabel: {
        bgcolor: '#1f1b33',
        font: { family: 'Inter', size: 12, color: '#ffffff' }
      },
      shapes: [
        {
          type: 'line',
          x0: 2019,
          x1: 2025,
          y0: 0,
          y1: 0,
          line: {
            color: '#231f3f',
            width: 1
          }
        }
      ]
    };

    Plotly.newPlot('plotlyChart', [barTrace, lineTrace], layout, { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
