<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 21a — Ketersediaan Jaminan Kesehatan (Plotly)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --yellow: #f5c543;
      --lime: #caef82;
      --deep-purple: #37206d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 12% 14%, rgba(93,63,211,0.13), transparent 55%),
                  radial-gradient(circle at 85% 10%, rgba(245,197,67,0.12), transparent 58%),
                  #f7f4ff;
    }
    .card {
      width: min(960px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid rgba(70,48,138,0.18);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(245,197,67,0.08), transparent 55%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 26px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(21px, 2.6vw, 30px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      position: relative;
      background: rgba(248,246,255,0.92);
      border-radius: 22px;
      padding: 28px 32px 40px;
      border: 1px solid rgba(93,63,211,0.12);
    }
    #plotly-g21a { width: 100%; height: 420px; }
    .legend-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      font-weight: 600;
      color: var(--deep-purple);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legend-dot {
      width: 18px;
      height: 18px;
      border-radius: 6px;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
      #plotly-g21a { height: 360px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 21.</div>
      <h1>Ketersediaan Jaminan Kesehatan di Tempat Kerja</h1>
    </header>

    <div class="plot-wrap">
      <div id="plotly-g21a"></div>
      <div class="legend-row">
        <div class="legend-item"><span class="legend-dot" style="background:var(--purple);"></span>Ya</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--yellow);"></span>Tidak</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--lime);"></span>Tidak Tahu</div>
      </div>
    </div>

    <div class="source">Sumber: Sakernas Agustus 2025; diolah oleh peneliti</div>
  </div>

  <script>
    const categories = [
      "Gen Z (15-17)",
      "Gen Z (18-28)",
      "Gen Y (29-44)",
      "Gen X (45-60)",
      "Baby Boomer (61-79)"
    ];

    const yaValues =  [9.5, 43.1, 48.2, 40.4, 13.6];
    const tidakValues = [90.2, 55.9, 51.4, 59.2, 86.1];
    const tTahuValues = [0.3, 1.0, 0.4, 0.4, 0.3];

    function makeTrace(name, values, color) {
      return {
        type: "bar",
        x: categories,
        y: values,
        name,
        marker: {
          color,
          line: { width: 1.5, color: "rgba(255,255,255,0.72)" },
          opacity: 0.98
        },
        text: values.map(v => v.toFixed(1).replace('.', ',')),
        textposition: "none",
        hovertemplate: `${name}: <b>%{y:.1f}%</b><extra></extra>`
      };
    }

    const data = [
      makeTrace("Ya", yaValues, "var(--purple)"),
      makeTrace("Tidak", tidakValues, "var(--yellow)"),
      makeTrace("Tidak Tahu", tTahuValues, "var(--lime)")
    ];

    const annotations = [];
    data.forEach((trace) => {
      trace.y.forEach((value, idx) => {
        if (value === 0) return;
        annotations.push({
          x: trace.x[idx],
          y: value + 2.5,
          text: `${value.toFixed(1).replace('.', ',')}%`,
          showarrow: false,
          font: { family: "Manrope", size: 12, color: "#2f1d63", weight: "700" },
          bgcolor: "rgba(255,255,255,0.92)",
          bordercolor: "rgba(93,63,211,0.12)",
          borderwidth: 1,
          borderpad: 4,
          yshift: 0
        });
      });
    });

    const layout = {
      barmode: "group",
      bargap: 0.26,
      bargroupgap: 0.1,
      margin: { t: 20, r: 30, b: 80, l: 70, pad: 4 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor: "rgba(0,0,0,0)",
      font: { family: "Manrope", color: "rgba(58,45,111,0.88)" },
      showlegend: false,
      annotations,
      xaxis: {
        tickfont: { size: 12, color: "rgba(47,36,95,0.78)" },
        tickangle: 0,
        gridcolor: "rgba(55,32,109,0.08)"
      },
      yaxis: {
        range: [0, 105],
        dtick: 20,
        tickfont: { size: 12, color: "rgba(47,36,95,0.75)" },
        gridcolor: "rgba(55,32,109,0.12)",
        title: { text: "Persentase (%)", font: { size: 12, color: "rgba(47,36,95,0.7)" } }
      },
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g21a", data, layout, { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
