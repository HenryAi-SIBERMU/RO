<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 16 — Proporsi Pendapatan 1% vs PPh Badan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --gold: #c9a832;
      --card-border: rgba(70, 48, 138, 0.2);
      --text-dark: #2f245f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93, 63, 211, 0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(201, 168, 50, 0.14), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(1120px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40, 26, 84, 0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.07), transparent 45%),
                  linear-gradient(315deg, rgba(201,168,50,0.06), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93, 63, 211, 0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 32px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .canvas-wrap {
      position: relative;
      background: rgba(248, 246, 255, 0.96);
      border-radius: 22px;
      padding: 28px 36px 40px 88px;
      border: 1px solid rgba(93, 63, 211, 0.15);
      overflow: hidden;
    }
    .axis-label-y {
      position: absolute;
      top: 50%;
      left: 38px;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: rgba(47, 36, 95, 0.6);
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    canvas {
      width: 100% !important;
      height: 400px !important;
      position: relative;
      z-index: 2;
    }
    .legend-grid {
      margin-top: 26px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      position: relative;
      z-index: 1;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(55, 32, 109, 0.12);
      backdrop-filter: blur(8px);
      font-size: 14px;
      color: var(--text-dark);
      font-weight: 600;
    }
    .swatch-line {
      width: 38px;
      height: 6px;
      border-radius: 999px;
    }
    .sw-gold { background: linear-gradient(90deg, #c9a832, #a88a22); }
    .sw-purple { background: linear-gradient(90deg, #7d62f6, #5d3fd3); }
    .source {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240, 193, 95, 0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 26px 40px; }
      .badge { margin-left: -26px; }
      .canvas-wrap { padding: 60px 26px 34px; }
      .axis-label-y { writing-mode: initial; transform: none; left: 26px; top: 26px; }
      canvas { height: 340px !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 16.</div>
      <h1>Proporsi Pendapatan 1% Teratas vs PPh Badan terhadap PDB di Indonesia, 2000-2025</h1>
    </header>

    <div class="canvas-wrap">
      <span class="axis-label-y">Persentase (%)</span>
      <canvas id="g16Chart"></canvas>
    </div>

    <div class="legend-grid">
      <div class="legend-item">
        <span class="swatch-line sw-gold"></span>
        Porsi Pendapatan Top 1% Sebelum Pajak
      </div>
      <div class="legend-item">
        <span class="swatch-line sw-purple"></span>
        Tarif PPh Badan
      </div>
    </div>

    <div class="source">Sumber: WID.world (2025); Kemenkeu (2025); BPS (2025); dan Trading Economics (2025), diolah oleh CELIOS</div>
  </div>

  <script>
    const years = [
      2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009,
      2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019,
      2020, 2021, 2022, 2023, 2024, 2025
    ];

    const porsiTop1 = [
      13.7, 14.2, 14.8, 15.5, 16.8, 18.2, 19.5, 20.15, 19.8, 18.6,
      17.9, 17.5, 17.2, 17.0, 16.8, 16.5, 16.2, 16.0, 15.8, 15.7,
      15.53, 16.0, 16.5, 17.2, 17.6, 18.04
    ];

    const tarifPPh = [
      30, 30, 30, 30, 30, 30, 30, 30, 30, 28,
      25, 25, 25, 25, 25, 25, 25, 25, 25, 25,
      22, 22, 22, 22, 22, 22
    ];

    const ctx = document.getElementById("g16Chart").getContext("2d");

    new Chart(ctx, {
      type: "line",
      data: {
        labels: years,
        datasets: [
          {
            label: "Porsi Pendapatan Top 1% Sebelum Pajak",
            data: porsiTop1,
            borderColor: "#c9a832",
            backgroundColor: "rgba(201,168,50,0.08)",
            borderWidth: 3,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: "#fff",
            pointBorderColor: "#c9a832",
            pointHoverRadius: 6,
            fill: false
          },
          {
            label: "Tarif PPh Badan",
            data: tarifPPh,
            borderColor: "#5d3fd3",
            backgroundColor: "rgba(93,63,211,0.08)",
            borderWidth: 3,
            tension: 0,
            pointRadius: 3,
            pointBackgroundColor: "#fff",
            pointBorderColor: "#5d3fd3",
            pointHoverRadius: 6,
            fill: false,
            stepped: "before"
          }
        ]
      },
      options: {
        maintainAspectRatio: false,
        layout: { padding: { left: 16, right: 24 } },
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "rgba(47, 33, 92, 0.92)",
            padding: 14,
            titleFont: { family: "Manrope", weight: "700", size: 13 },
            bodyFont: { family: "Manrope", weight: "600", size: 12 },
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}%`
            }
          }
        },
        scales: {
          x: {
            type: "linear",
            min: 2000,
            max: 2025,
            grid: { color: "rgba(55, 32, 109, 0.1)", drawTicks: false },
            ticks: {
              font: { family: "Manrope", weight: "600", size: 11 },
              color: "rgba(43, 35, 89, 0.78)",
              stepSize: 1,
              callback: v => (v % 5 === 0 ? v : "")
            }
          },
          y: {
            suggestedMin: 8,
            suggestedMax: 34,
            grid: { color: "rgba(55, 32, 109, 0.16)", drawTicks: false },
            ticks: {
              stepSize: 5,
              font: { family: "Manrope", weight: "600", size: 11 },
              color: "rgba(43, 35, 89, 0.78)",
              callback: v => `${v}`
            }
          }
        }
      }
    });
  </script>
</body>
</html>
