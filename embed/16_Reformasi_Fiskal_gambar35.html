<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 35 — Zoomable Sunburst: Lingkaran Setan Oligarki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70,48,138,0.2);
      --lavender: rgba(248,246,255,0.96);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(980px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg,rgba(93,63,211,0.06),transparent 45%),
                  linear-gradient(315deg,rgba(242,181,68,0.05),transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
      white-space: nowrap;
    }
    h1 {
      margin: 0;
      font-size: clamp(15px, 1.9vw, 22px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.3;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 16px 28px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hint {
      font-size: 12px;
      font-weight: 600;
      color: rgba(55,32,109,0.5);
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }
    #sunburst-svg { width: 100%; max-width: 620px; cursor: pointer; }
    /* D3 sunburst labels */
    text.sb-label {
      font-family: "Manrope", sans-serif;
      font-size: 11px;
      font-weight: 700;
      fill: #fff;
      pointer-events: none;
      dominant-baseline: middle;
      text-anchor: middle;
    }
    text.sb-label.dark { fill: #37206d; }
    .center-label {
      font-family: "Manrope", sans-serif;
      font-weight: 800;
      font-size: 13px;
      fill: #37206d;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 700px) {
      .card { padding: 28px 16px 32px; }
      .badge { margin-left: -16px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 35.</div>
      <h1>Oligarki dalam Pakaian Demokrasi: Bagaimana Elite Mengakuisisi Partai</h1>
    </header>

    <div class="plot-wrap">
      <div class="hint">🔍 Klik segmen untuk zoom masuk · Klik pusat untuk zoom keluar</div>
      <svg id="sunburst-svg" viewBox="-305 -305 610 610"></svg>
    </div>

    <div class="source">Sumber: Analisis Peneliti</div>
  </div>

  <script>
    /* ── Data ── */
    const data = {
      name: "Lingkaran\nSetan\nOligarki",
      children: [
        {
          name: "Kekayaan", color: "#f59e0b",
          children: [
            {name: "Korporasi",        value: 1},
            {name: "Konsensi tambang", value: 1},
            {name: "Konsensi hutan",   value: 1},
            {name: "Data center",      value: 1}
          ]
        },
        {
          name: "Kontrol Politik", color: "#7c3aed",
          children: [
            {name: "Mendanai Partai",  value: 1},
            {name: "Sponsor Politik",  value: 1},
            {name: "Mahar Politik",    value: 1},
            {name: "Punya Partai",     value: 1}
          ]
        },
        {
          name: "Pemilu", color: "#6d28d9",
          children: [
            {name: "High cost politics", value: 1},
            {name: "Media",              value: 1},
            {name: "Money Politics",     value: 1}
          ]
        },
        {
          name: "Kebijakan", color: "#3b0764",
          children: [
            {name: "Menguasai parlemen",       value: 1},
            {name: "Bypass Birokrasi",          value: 1},
            {name: "Pengaruhi Kebijakan",       value: 1}
          ]
        },
        {
          name: "Dampak Kebijakan", color: "#8b5cf6",
          children: [
            {name: "Insentif korporasi", value: 1},
            {name: "Tender konvensi",    value: 1},
            {name: "Pajak regresif",     value: 1},
            {name: "Tax amnesty",        value: 1},
            {name: "Proyek PSN",         value: 1}
          ]
        }
      ]
    };

    /* ── D3 Zoomable Sunburst ── */
    const svg = d3.select("#sunburst-svg");

    /* Fixed ring radii — inner/outer per depth layer */
    const INNER = [0,   68, 182];
    const OUTER = [62, 178, 282];

    const arc = d3.arc()
      .startAngle(d => d.x0)
      .endAngle(d => d.x1)
      .padAngle(d => d.depth === 0 ? 0 : 0.013)
      .padRadius(120)
      .innerRadius(d => INNER[Math.min(d.depth, 2)])
      .outerRadius(d => OUTER[Math.min(d.depth, 2)]);

    function colorOf(d) {
      if (d.depth === 0) return "#f0eaff";
      let n = d; while (n.depth > 1) n = n.parent;
      const base = d3.color(n.data.color);
      if (d.depth === 1) return base.toString();
      return base.brighter(0.55).toString();
    }

    const root = d3.hierarchy(data)
      .sum(d => d.value || 0)
      .sort((a, b) => b.value - a.value);

    d3.partition().size([2 * Math.PI, 3])(root);
    root.each(d => { d.current = { x0: d.x0, x1: d.x1, y0: d.y0, y1: d.y1 }; });

    /* Arcs */
    const path = svg.append("g").selectAll("path")
      .data(root.descendants())
      .join("path")
        .attr("fill", d => colorOf(d))
        .attr("fill-opacity", d => d.depth === 0 ? 1 : arcVisible(d.current) ? (d.children ? 0.88 : 0.72) : 0)
        .attr("d", d => arc(d.current))
        .style("cursor", d => d.children ? "pointer" : "default")
        .on("click", clicked);

    path.append("title").text(d => `${d.ancestors().map(d => d.data.name?.replace("\n", " ")).reverse().join(" › ")}`);

    /* Labels */
    const label = svg.append("g")
        .attr("pointer-events", "none")
        .attr("text-anchor", "middle")
      .selectAll("text")
      .data(root.descendants())
      .join("text")
        .attr("class", d => {
          const c = d3.color(colorOf(d));
          return "sb-label" + (c && c.l > 0.75 ? " dark" : "");
        })
        .attr("fill-opacity", d => +labelVisible(d.current))
        .attr("transform", d => labelTransform(d.current))
        .each(function(d) {
          const name = d.data.name?.replace("\n", " ") || "";
          const words = name.split(" ");
          if (words.length <= 2 || d.depth === 2) {
            d3.select(this).text(name);
          } else {
            const mid = Math.ceil(words.length / 2);
            d3.select(this)
              .append("tspan").attr("x", 0).attr("dy", "-0.55em").text(words.slice(0, mid).join(" "));
            d3.select(this)
              .append("tspan").attr("x", 0).attr("dy", "1.15em").text(words.slice(mid).join(" "));
          }
        });

    /* Center circle with label */
    svg.append("circle")
      .datum(root)
      .attr("r", 60)
      .attr("fill", "#f0eaff")
      .attr("stroke", "rgba(93,63,211,0.2)")
      .attr("stroke-width", 1.5)
      .style("cursor", "pointer")
      .on("click", (event, p) => clicked(event, p));

    const centerLines = ["Lingkaran", "Setan", "Oligarki"];
    centerLines.forEach((line, i) => {
      svg.append("text")
        .attr("class", "center-label")
        .attr("y", (i - 1) * 17)
        .text(line);
    });

    /* ── Zoom interaction ── */
    function clicked(event, p) {
      if (!p.children) return;
      const zoomTarget = p.parent && p.depth > 0 ? p : root;

      root.each(d => {
        d.target = {
          x0: Math.max(0, Math.min(1, (d.x0 - zoomTarget.x0) / (zoomTarget.x1 - zoomTarget.x0))) * 2 * Math.PI,
          x1: Math.max(0, Math.min(1, (d.x1 - zoomTarget.x0) / (zoomTarget.x1 - zoomTarget.x0))) * 2 * Math.PI,
          y0: Math.max(0, d.y0 - zoomTarget.depth),
          y1: Math.max(0, d.y1 - zoomTarget.depth)
        };
      });

      const t = svg.transition().duration(700).ease(d3.easeCubicInOut);

      path.transition(t)
        .tween("data", d => {
          const i = d3.interpolate(d.current, d.target);
          return tt => { d.current = i(tt); };
        })
        .filter(function(d) { return +this.getAttribute("fill-opacity") || arcVisible(d.target); })
        .attr("fill-opacity", d => d.depth === 0 ? 1 : arcVisible(d.target) ? (d.children ? 0.88 : 0.72) : 0)
        .attrTween("d", d => () => arc(d.current));

      label.filter(function(d) { return +this.getAttribute("fill-opacity") || labelVisible(d.target); })
        .transition(t)
        .attr("fill-opacity", d => +labelVisible(d.target))
        .attrTween("transform", d => () => labelTransform(d.current));
    }

    function arcVisible(d) {
      return d.y1 <= 3 && d.y0 >= 1 && d.x1 > d.x0;
    }
    function labelVisible(d) {
      return d.y1 <= 3 && d.y0 >= 1 && (d.y1 - d.y0) * (d.x1 - d.x0) > 0.04;
    }
    function labelTransform(d) {
      const x = (d.x0 + d.x1) / 2 * 180 / Math.PI;
      const MID = [30, 123, 232];
      const r = MID[Math.min(d.depth, 2)];
      return `rotate(${x - 90}) translate(${r},0) rotate(${x < 180 ? 0 : 180})`;
    }
  </script>
</body>
</html>
