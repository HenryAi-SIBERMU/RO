<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gambar 12 – Distribusi Pendapatan & Kekayaan (Plotly)</title>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-main: #5c26b5;
      --purple-soft: #f2ecff;
      --yellow-main: #f3c64f;
      --bg-body: #f5f3ff;
      --text-dark: #24194c;
      --text-muted: rgba(36, 25, 76, 0.65);
      --card-radius: 36px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-body);
      color: var(--text-dark);
      padding: 48px 24px 64px;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(214,201,255,0.52));
      border-radius: 42px;
      padding: 48px 54px 68px;
      position: relative;
      box-shadow: 0 40px 70px rgba(91,59,158,0.16);
      overflow: hidden;
    }
    main::before,
    main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 12% 18%, rgba(108,70,193,0.28), transparent 56%),
                  radial-gradient(circle at 86% 84%, rgba(243,198,79,0.4), transparent 65%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }
    .tag {
      width: fit-content;
      padding: 12px 30px;
      background: var(--purple-main);
      color: #fff;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 16px 40px rgba(92,38,181,0.25);
    }
    h1 {
      margin: 0;
      font-size: clamp(26px,3vw,34px);
      font-weight: 800;
      color: var(--purple-main);
    }
    .subtitle {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .chart-wrapper {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.9);
      border-radius: 30px;
      padding: 32px 26px 40px;
      box-shadow: inset 0 0 0 1px rgba(92,38,181,0.12);
    }
    .legend {
      display: inline-flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 5px;
    }
    .legend-dot.purple { background: var(--purple-main); }
    .legend-dot.yellow { background: var(--yellow-main); }
    .y-axis-label {
      position: absolute;
      top: 50%;
      left: 8px;
      transform: translate(-100%, -50%) rotate(-90deg);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
      z-index: 2;
    }
    #plotly-g12 {
      width: 100%;
      height: 480px;
    }
    .source {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-radius: 20px;
      background: rgba(243,198,79,0.18);
      color: var(--text-dark);
      font-size: 13px;
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(243,198,79,0.35);
    }
    @media (max-width: 768px) {
      body { padding: 32px 16px 48px; }
      main { padding: 36px 24px 48px; }
      .chart-wrapper { padding: 24px 14px 32px; }
      #plotly-g12 { height: 440px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="tag">Gambar 12.</span>
      <h1>Distribusi Pendapatan dan Kekayaan di Indonesia</h1>
      <p class="subtitle">Persentase bagian pendapatan atau kekayaan nasional (%)</p>
    </header>

    <section class="chart-wrapper">
      <div class="legend">
        <span class="legend-item"><span class="legend-dot purple"></span>Pendapatan</span>
        <span class="legend-item"><span class="legend-dot yellow"></span>Kekayaan</span>
      </div>
      <span class="y-axis-label">Persentase</span>
      <div id="plotly-g12"></div>
    </section>

    <div class="source">Sumber: World Inequality Database 2019, diolah peneliti</div>
  </main>

  <script>
    const labels = ["50% Terbawah", "40% Menengah", "10% Teratas"];
    const income = [16, 38, 46];
    const wealth = [5, 36, 59];

    const incomeTrace = {
      x: labels,
      y: income,
      type: 'bar',
      name: 'Pendapatan',
      marker: {
        color: labels.map(() => '#5c26b5'),
        line: { color: '#431c8b', width: 1 }
      },
      width: 0.32,
      text: income.map(v => `${v}%`),
      textposition: 'outside',
      textfont: { family: 'Plus Jakarta Sans', color: '#431c8b', size: 13 },
      cliponaxis: false,
      hovertemplate: '<b>%{x}</b><br>Pendapatan: %{y}%<extra></extra>'
    };

    const wealthTrace = {
      x: labels,
      y: wealth,
      type: 'bar',
      name: 'Kekayaan',
      marker: {
        color: labels.map(() => '#f3c64f'),
        line: { color: '#c58100', width: 1 }
      },
      width: 0.32,
      text: wealth.map(v => `${v}%`),
      textposition: 'outside',
      textfont: { family: 'Plus Jakarta Sans', color: '#c58100', size: 13 },
      cliponaxis: false,
      hovertemplate: '<b>%{x}</b><br>Kekayaan: %{y}%<extra></extra>'
    };

    const layout = {
      barmode: 'group',
      bargroupgap: 0.24,
      margin: { l: 60, r: 40, t: 10, b: 70 },
      paper_bgcolor: 'rgba(255,255,255,0)',
      plot_bgcolor: 'rgba(255,255,255,0)',
      xaxis: {
        tickfont: { family: 'Plus Jakarta Sans', color: '#311763', size: 12, weight: 600 },
        gridcolor: 'rgba(0,0,0,0)'
      },
      yaxis: {
        rangemode: 'tozero',
        gridcolor: 'rgba(92,38,181,0.12)',
        zeroline: true,
        zerolinecolor: '#431c8b',
        zerolinewidth: 1.4,
        tickfont: { family: 'Plus Jakarta Sans', color: '#311763', size: 12, weight: 600 },
        ticksuffix: '%',
        range: [0, 65]
      },
      showlegend: false,
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#291552',
        font: { family: 'Plus Jakarta Sans', size: 12, color: '#fff' }
      }
    };

    Plotly.newPlot('plotly-g12', [incomeTrace, wealthTrace], layout, {
      displayModeBar: false,
      responsive: true
    });
  </script>
</body>
</html>
