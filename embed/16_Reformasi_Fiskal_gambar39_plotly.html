<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 39 — Dukungan Publik terhadap Penerapan Pajak Kekayaan di Indonesia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(780px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(16px, 2vw, 22px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 28px 28px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
    }
    #plotly-g39 { width: 100%; height: 420px; }
    .legend-row {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      color: var(--deep-purple);
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 700px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 39.</div>
      <h1>Dukungan Publik terhadap Penerapan Pajak Kekayaan di Indonesia</h1>
    </header>

    <div class="plot-wrap">
      <div id="plotly-g39"></div>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-dot" style="background:#5d3fd3;"></div>
          Ya
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f0ab00;"></div>
          Tidak
        </div>
      </div>
    </div>

    <div class="source">Sumber: Survei Pajak Kekayaan CELIOS, 2025</div>
  </div>

  <script>
    const trace = {
      type: "pie",
      hole: 0.55,
      values: [89.77, 10.23],
      labels: ["Ya", "Tidak"],
      marker: {
        colors: ["#5d3fd3", "#f0ab00"],
        line: { color: "#ffffff", width: 3 }
      },
      textinfo: "percent",
      textfont: { family: "Manrope", size: 18, color: "#ffffff", weight: "bold" },
      insidetextorientation: "auto",
      hovertemplate: "<b>%{label}</b><br>%{value:.2f}%<extra></extra>",
      sort: false,
      rotation: -90,
      pull: [0.03, 0.06]
    };

    const layout = {
      margin: { t: 20, r: 20, b: 20, l: 20 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor:  "rgba(0,0,0,0)",
      font: { family: "Manrope" },
      showlegend: false,
      annotations: [
        {
          text: "<b>89.77%</b>",
          x: 0.5, y: 0.5,
          font: { family: "Manrope", size: 28, color: "#37206d", weight: "bold" },
          showarrow: false,
          xanchor: "center",
          yanchor: "middle"
        }
      ],
      hoverlabel: {
        font: { family: "Manrope", size: 13, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g39", [trace], layout,
      { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
