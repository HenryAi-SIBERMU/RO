<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 30 — Lebih Banyak Perempuan Bekerja di Sektor Informal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(1020px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(17px, 2.1vw, 25px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 28px 32px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
    }
    #plotly-g30 { width: 100%; height: 520px; }
    .legend-row {
      display: flex;
      gap: 28px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--deep-purple);
    }
    .legend-dot {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 30.</div>
      <h1>Lebih Banyak Perempuan Bekerja di Sektor Informal</h1>
    </header>

    <div class="plot-wrap">
      <div id="plotly-g30"></div>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-dot" style="background:#5d3fd3;"></div>
          Laki-laki
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f0ab00;"></div>
          Perempuan
        </div>
      </div>
    </div>

    <div class="source">Sumber: Sakernas Agustus 2025, diolah oleh peneliti</div>
  </div>

  <script>
    const cats = [
      "Berusaha dibantu<br>buruh tetap dan<br>dibayar",
      "Buruh/karyawan/<br>pegawai",
      "Total",
      "Berusaha sendiri",
      "Berusaha dibantu<br>buruh tidak tetap/<br>pekerja keluarga/<br>tidak dibayar",
      "Pekerja bebas<br>pertanian",
      "Pekerja bebas<br>non-pertanian",
      "Pekerja keluarga/<br>tidak dibayar",
      "Total"
    ];

    const lakiData       = [4.43, 41.44, 45.87, 20.96, 14.91, 5.09, 6.67, 6.5,  54.13];
    const perempuanData  = [1.98, 34.68, 36.66, 22.06, 12.28, 3.39,  2.9, 22.7, 63.33];

    const traceLaki = {
      type: "bar",
      name: "Laki-laki",
      x: cats,
      y: lakiData,
      marker: {
        color: "#5d3fd3",
        line: { color: "rgba(255,255,255,0.5)", width: 1 }
      },
      text: lakiData.map(v => v.toFixed(2)),
      textposition: "outside",
      textfont: { family: "Manrope", size: 11, color: "#37206d" },
      hovertemplate: "%{x}<br>Laki-laki: <b>%{y:.2f}%</b><extra></extra>",
      cliponaxis: false
    };

    const tracePerempuan = {
      type: "bar",
      name: "Perempuan",
      x: cats,
      y: perempuanData,
      marker: {
        color: "#f0ab00",
        line: { color: "rgba(255,255,255,0.5)", width: 1 }
      },
      text: perempuanData.map(v => v.toFixed(2)),
      textposition: "outside",
      textfont: { family: "Manrope", size: 11, color: "#7a5400" },
      hovertemplate: "%{x}<br>Perempuan: <b>%{y:.2f}%</b><extra></extra>",
      cliponaxis: false
    };

    const layout = {
      barmode: "group",
      bargap: 0.3,
      bargroupgap: 0.06,
      margin: { t: 40, r: 24, b: 140, l: 50, pad: 4 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor:  "rgba(0,0,0,0)",
      font: { family: "Manrope" },
      showlegend: false,
      xaxis: {
        tickfont: { size: 11, color: "rgba(47,36,95,0.8)" },
        tickangle: 0,
        gridcolor: "rgba(0,0,0,0)",
        automargin: true
      },
      yaxis: {
        range: [0, 72],
        dtick: 10,
        tickfont: { size: 12, color: "rgba(47,36,95,0.7)" },
        gridcolor: "rgba(93,63,211,0.1)",
        zeroline: true,
        zerolinecolor: "rgba(93,63,211,0.2)",
        zerolinewidth: 1,
        ticksuffix: ""
      },
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g30", [traceLaki, tracePerempuan], layout,
      { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
