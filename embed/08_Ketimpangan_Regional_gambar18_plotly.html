<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 18 — Durasi Menganggur per Generasi (Plotly)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --lavender: rgba(248,246,255,0.96);
      --card-border: rgba(70,48,138,0.2);
      --text-dark: #2f245f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93, 63, 211, 0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242, 181, 68, 0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(960px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40, 26, 84, 0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93, 63, 211, 0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 2.7vw, 31px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      position: relative;
      background: var(--lavender);
      border-radius: 22px;
      padding: 34px 32px 46px 92px;
      border: 1px solid rgba(93, 63, 211, 0.15);
      overflow: hidden;
    }
    .axis-label-y {
      position: absolute;
      top: 50%;
      left: 40px;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: rgba(47, 36, 95, 0.6);
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    #plotly-g18 { width: 100%; height: 380px; }
    .source {
      margin-top: 30px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240, 193, 95, 0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 24px 40px; }
      .badge { margin-left: -24px; }
      .plot-wrap { padding: 70px 24px 38px; }
      .axis-label-y {
        writing-mode: initial;
        transform: none;
        top: 26px;
        left: 24px;
      }
      #plotly-g18 { height: 340px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 18.</div>
      <h1>Gen Z Paling Lama Menganggur</h1>
    </header>

    <div class="plot-wrap">
      <span class="axis-label-y">Bulan</span>
      <div id="plotly-g18"></div>
    </div>

    <div class="source">Sumber: Sakernas Agustus (2025); diolah oleh peneliti</div>
  </div>

  <script>
    const generations = ["Z (18-28)", "Y (29-44)", "X (45-60)", "Boomer (61-79)"];
    const months = [7.5, 6.3, 5.2, 3.7];
    const colors = ["#39177b", "#4e1ea5", "#5f1fbf", "#7a4ac9"];

    const traces = [
      {
        type: "bar",
        x: generations,
        y: months,
        marker: {
          color: colors,
          line: { color: "rgba(255,255,255,0.6)", width: 1.4 },
          opacity: 0.95
        },
        hovertemplate: "%{x}<br>%{y:.1f} bulan<extra></extra>",
        text: months.map(v => v.toFixed(1).replace(".", ",")),
        textposition: "outside",
        textfont: { family: "Manrope", size: 14, color: "#301d66", weight: 700 }
      }
    ];

    const layout = {
      margin: { t: 16, r: 32, b: 64, l: 56, pad: 6 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor: "rgba(0,0,0,0)",
      font: { family: "Manrope", color: "rgba(43,35,89,0.85)" },
      showlegend: false,
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47, 33, 92, 0.92)",
        bordercolor: "transparent"
      },
      xaxis: {
        tickfont: { size: 13, color: "rgba(47,36,95,0.78)", family: "Manrope" },
        gridcolor: "rgba(55,32,109,0.08)",
        tickangle: 0
      },
      yaxis: {
        range: [0, 8.2],
        dtick: 1,
        tickfont: { size: 12, color: "rgba(47,36,95,0.7)", family: "Manrope" },
        gridcolor: "rgba(55,32,109,0.12)",
        ticksuffix: ""
      }
    };

    Plotly.newPlot("plotly-g18", traces, layout, { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
