<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gambar 11 – Ketimpangan & Kemiskinan Regional (Chart.js)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-main: #5c26b5;
      --purple-soft: #f2ecff;
      --yellow-main: #f3c64f;
      --bg-body: #f5f3ff;
      --text-dark: #24194c;
      --text-muted: rgba(36, 25, 76, 0.65);
      --card-radius: 36px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-body);
      color: var(--text-dark);
      padding: 48px 24px 64px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(214, 201, 255, 0.52));
      border-radius: 42px;
      padding: 48px 54px 68px;
      position: relative;
      box-shadow: 0 40px 70px rgba(91, 59, 158, 0.16);
      overflow: hidden;
    }

    main::before,
    main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 12% 18%, rgba(108, 70, 193, 0.28), transparent 56%),
                  radial-gradient(circle at 86% 84%, rgba(243, 198, 79, 0.4), transparent 65%);
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
    }

    .tag {
      width: fit-content;
      padding: 12px 30px;
      background: var(--purple-main);
      color: #fff;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.02em;
      box-shadow: 0 16px 40px rgba(92, 38, 181, 0.25);
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 34px);
      font-weight: 800;
      color: var(--purple-main);
    }

    .subtitle {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .chart-wrapper {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.9);
      border-radius: 30px;
      padding: 32px 30px 40px;
      box-shadow: inset 0 0 0 1px rgba(92, 38, 181, 0.12);
    }

    .y-axis-label {
      position: absolute;
      top: 50%;
      left: 8px;
      transform: translate(-100%, -50%) rotate(-90deg);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .legend {
      display: inline-flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 5px;
    }

    .legend-dot.purple { background: var(--purple-main); }
    .legend-dot.yellow { background: var(--yellow-main); }

    canvas { width: 100% !important; }

    .source {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px;
      border-radius: 20px;
      background: rgba(243, 198, 79, 0.18);
      color: var(--text-dark);
      font-size: 13px;
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(243, 198, 79, 0.35);
    }

    @media (max-width: 768px) {
      body { padding: 32px 16px 48px; }
      main { padding: 36px 24px 48px; }
      .chart-wrapper { padding: 24px 18px 32px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="tag">Gambar 11.</span>
      <h1>Ketimpangan dan Kemiskinan Regional di Indonesia berdasarkan Pulau</h1>
      <p class="subtitle">Persentase PDB & Tingkat Kemiskinan</p>
    </header>

    <section class="chart-wrapper">
      <div class="legend">
        <span class="legend-item"><span class="legend-dot purple"></span>Persentase PDB (%)</span>
        <span class="legend-item"><span class="legend-dot yellow"></span>Tingkat Kemiskinan (%)</span>
      </div>
      <span class="y-axis-label">Persentase</span>
      <canvas id="chartG11"></canvas>
    </section>

    <div class="source">Sumber: Laporan Harta Kekayaan Pejabat Negara 2025, diolah peneliti</div>
  </main>

  <script>
    const data = {
      labels: ["Jawa", "Sumatra", "Kalimantan", "Sulawesi", "Bali & Nusa Tenggara", "Maluku & Papua"],
      pdb: [50, 22.1, 8.2, 8.0, 3.5, 8.0],
      poverty: [7.5, 8.2, 7.1, 9.0, 2.8, 18.6]
    };

    const valueLabelPlugin = {
      id: 'valueLabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        ctx.font = '600 13px "Plus Jakarta Sans"';
        ctx.textBaseline = 'bottom';

        chart.data.datasets.forEach((dataset, datasetIndex) => {
          const meta = chart.getDatasetMeta(datasetIndex);
          meta.data.forEach((bar, index) => {
            const value = dataset.data[index];
            const x = bar.x;
            const y = bar.y - 4;
            ctx.fillStyle = datasetIndex === 0 ? '#431c8b' : '#c58100';
            ctx.textAlign = 'center';
            ctx.fillText(`${value}%`, x, y);
          });
        });

        ctx.restore();
      }
    };

    const ctx = document.getElementById('chartG11');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.labels,
        datasets: [
          {
            label: 'Persentase PDB (%)',
            data: data.pdb,
            backgroundColor: ctx => {
              const { chart } = ctx;
              const { ctx: canvasCtx, chartArea } = chart;
              if (!chartArea) return '#5c26b5';
              const gradient = canvasCtx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
              gradient.addColorStop(0, '#6129c3');
              gradient.addColorStop(1, '#7a45ff');
              return gradient;
            },
            borderRadius: 10,
            borderSkipped: false,
            barPercentage: 0.58,
            categoryPercentage: 0.7
          },
          {
            label: 'Tingkat Kemiskinan (%)',
            data: data.poverty,
            backgroundColor: '#f8d168',
            borderRadius: 10,
            borderSkipped: false,
            barPercentage: 0.58,
            categoryPercentage: 0.7
          }
        ]
      },
      options: {
        responsive: true,
        aspectRatio: 1.35,
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              color: '#311763',
              font: { family: 'Plus Jakarta Sans', weight: '600' }
            }
          },
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(92, 38, 181, 0.1)', lineWidth: 1 },
            ticks: {
              color: '#311763',
              font: { family: 'Plus Jakarta Sans', weight: '600' },
              callback: (value) => `${value}%`
            }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: true,
            backgroundColor: '#291552',
            titleFont: { family: 'Plus Jakarta Sans', weight: '700' },
            bodyFont: { family: 'Plus Jakarta Sans', weight: '600' },
            padding: 12,
            callbacks: {
              label: (context) => `${context.dataset.label}: ${context.parsed.y}%`
            }
          },
          datalabels: false
        },
        layout: {
          padding: {
            top: 10,
            right: 16,
            bottom: 0,
            left: 0
          }
        }
      },
      plugins: [valueLabelPlugin]
    });
  </script>
</body>
</html>
