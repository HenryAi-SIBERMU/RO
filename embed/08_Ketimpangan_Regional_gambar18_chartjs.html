<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 18 — Durasi Menganggur per Generasi (Chart.js)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --lavender: rgba(248,246,255,0.96);
      --card-border: rgba(70,48,138,0.2);
      --text-dark: #2f245f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93, 63, 211, 0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242, 181, 68, 0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(960px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40, 26, 84, 0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93, 63, 211, 0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 2.7vw, 31px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .canvas-wrap {
      position: relative;
      background: var(--lavender);
      border-radius: 22px;
      padding: 34px 32px 46px 92px;
      border: 1px solid rgba(93, 63, 211, 0.15);
      overflow: hidden;
    }
    .axis-label-y {
      position: absolute;
      top: 50%;
      left: 40px;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: rgba(47, 36, 95, 0.6);
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    canvas {
      width: 100% !important;
      height: 380px !important;
      position: relative;
      z-index: 2;
    }
    .source {
      margin-top: 30px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240, 193, 95, 0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 24px 40px; }
      .badge { margin-left: -24px; }
      .canvas-wrap { padding: 70px 24px 38px; }
      .axis-label-y {
        writing-mode: initial;
        transform: none;
        top: 26px;
        left: 24px;
      }
      canvas { height: 340px !important; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 18.</div>
      <h1>Gen Z Paling Lama Menganggur</h1>
    </header>

    <div class="canvas-wrap">
      <span class="axis-label-y">Bulan</span>
      <canvas id="g18Chart"></canvas>
    </div>

    <div class="source">Sumber: Sakernas Agustus (2025); diolah oleh peneliti</div>
  </div>

  <script>
    const labels = [
      "Z (18-28)",
      "Y (29-44)",
      "X (45-60)",
      "Boomer (61-79)"
    ];

    const monthsUnemployed = [7.5, 6.3, 5.2, 3.7];

    const gradients = [];
    const ctx = document.getElementById("g18Chart").getContext("2d");

    function makeGradient(ctx, chartArea, colors) {
      const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
      gradient.addColorStop(0, colors[0]);
      gradient.addColorStop(1, colors[1]);
      return gradient;
    }

    const valueLabelPlugin = {
      id: "valueLabels",
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        ctx.font = "700 16px 'Manrope'";
        ctx.textBaseline = "bottom";
        ctx.fillStyle = "#301d66";
        chart.getDatasetMeta(0).data.forEach((bar, index) => {
          const value = chart.data.datasets[0].data[index];
          ctx.textAlign = "center";
          ctx.fillText(value.toFixed(1).replace(".", ","), bar.x, bar.y - 8);
        });
        ctx.restore();
      }
    };

    const chart = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            label: "Durasi menganggur (bulan)",
            data: monthsUnemployed,
            borderRadius: 16,
            borderSkipped: false,
            barPercentage: 0.58,
            categoryPercentage: 0.7,
            backgroundColor: function(context) {
              const { chart } = context;
              const { ctx, chartArea } = chart;
              if (!chartArea) {
                return "#6f52d8"; // fallback during initial animation
              }
              if (!gradients[context.dataIndex]) {
                const palette = [
                  ["#39177b", "#6b38d6"],
                  ["#4e1ea5", "#7d45ed"],
                  ["#5f1fbf", "#9348ff"],
                  ["#7a4ac9", "#b17cff"]
                ];
                gradients[context.dataIndex] = makeGradient(ctx, chartArea, palette[context.dataIndex]);
              }
              return gradients[context.dataIndex];
            }
          }
        ]
      },
      options: {
        maintainAspectRatio: false,
        layout: { padding: { top: 16, right: 20, bottom: 8, left: 0 } },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              color: "rgba(47, 36, 95, 0.78)",
              font: { family: "Manrope", weight: "700", size: 13 }
            }
          },
          y: {
            beginAtZero: true,
            suggestedMax: 8,
            grid: { color: "rgba(55, 32, 109, 0.12)", drawTicks: false },
            ticks: {
              stepSize: 1,
              color: "rgba(47, 36, 95, 0.7)",
              font: { family: "Manrope", weight: "600", size: 12 },
              callback: value => value.toFixed(0)
            }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "rgba(47, 33, 92, 0.92)",
            padding: 12,
            titleFont: { family: "Manrope", weight: "700", size: 13 },
            bodyFont: { family: "Manrope", weight: "600", size: 12 },
            callbacks: {
              label: context => `${context.parsed.y.toFixed(1).replace(".", ",")} bulan`
            }
          }
        }
      },
      plugins: [valueLabelPlugin]
    });
  </script>
</body>
</html>
