<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 33 — Ketimpangan Tunjangan Kinerja TNI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(980px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
      white-space: nowrap;
    }
    h1 {
      margin: 0;
      font-size: clamp(16px, 2vw, 23px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.3;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 28px 32px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
    }
    #plotly-g33 { width: 100%; height: 320px; }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 33.</div>
      <h1>Ketimpangan Tunjangan Kinerja di Lingkungan<br>Tentara Nasional Indonesia</h1>
    </header>

    <div class="plot-wrap">
      <div id="plotly-g33"></div>
    </div>

    <div class="source">Sumber: Peraturan Presiden Nomor 102 Tahun 2018</div>
  </div>

  <script>
    function fmtRp(v) {
      return v.toLocaleString("id-ID");
    }

    const cats = [
      "Kepala Staf AD/AU/AL",
      "Wakil Kepala Staf AD/AU/AL dan KS Umum",
      "Kelas Jabatan 1"
    ];
    const vals = [37810500, 34902000, 1968000];

    const trace = {
      type: "bar",
      orientation: "h",
      y: cats,
      x: vals,
      marker: {
        color: "#5d3fd3",
        line: { color: "rgba(255,255,255,0.4)", width: 1 }
      },
      text: vals.map(v => fmtRp(v)),
      textposition: "outside",
      textfont: { family: "Manrope", size: 13, color: "#37206d" },
      cliponaxis: false,
      hovertemplate: "%{y}<br><b>Rp %{text}</b><extra></extra>",
      showlegend: false
    };

    const layout = {
      margin: { t: 20, r: 130, b: 70, l: 270, pad: 4 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor:  "rgba(0,0,0,0)",
      font: { family: "Manrope" },
      showlegend: false,
      xaxis: {
        range: [0, 43000000],
        tickvals: [0, 10000000, 20000000, 30000000, 40000000],
        ticktext: ["0", "10.000.000", "20.000.000", "30.000.000", "40.000.000"],
        tickfont: { size: 11, color: "rgba(47,36,95,0.7)" },
        gridcolor: "rgba(93,63,211,0.10)",
        zeroline: true,
        zerolinecolor: "rgba(93,63,211,0.25)",
        zerolinewidth: 1,
        title: {
          text: "Jumlah (dalam Rupiah)",
          font: { size: 12, color: "rgba(47,36,95,0.65)" },
          standoff: 14
        }
      },
      yaxis: {
        tickfont: { size: 13, color: "rgba(47,36,95,0.85)" },
        gridcolor: "rgba(0,0,0,0)",
        autorange: true
      },
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g33", [trace], layout,
      { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
