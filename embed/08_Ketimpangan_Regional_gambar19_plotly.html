<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 19 — Lulusan Sarjana & Gen Z Menjadi Pekerja Kasar (Plotly)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93, 63, 211, 0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242, 181, 68, 0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(960px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40, 26, 84, 0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93, 63, 211, 0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 2.7vw, 31px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      position: relative;
      background: var(--lavender);
      border-radius: 22px;
      padding: 34px 32px 46px 92px;
      border: 1px solid rgba(93, 63, 211, 0.15);
      overflow: hidden;
    }
    .axis-label-y {
      position: absolute;
      top: 50%;
      left: 40px;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: rgba(47, 36, 95, 0.6);
      text-align: center;
      pointer-events: none;
      z-index: 1;
    }
    #plotly-g19 { width: 100%; height: 380px; }
    .source {
      margin-top: 30px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240, 193, 95, 0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 24px 40px; }
      .badge { margin-left: -24px; }
      .plot-wrap { padding: 70px 24px 38px; }
      .axis-label-y {
        writing-mode: initial;
        transform: none;
        top: 26px;
        left: 24px;
      }
      #plotly-g19 { height: 340px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 19.</div>
      <h1>Lulusan Sarjana dan Gen Z menjadi Pekerja Kasar</h1>
    </header>

    <div class="plot-wrap">
      <span class="axis-label-y">Total Pekerja Kasar (Juta Jiwa)</span>
      <div id="plotly-g19"></div>
    </div>

    <div class="source">Sumber: Sakernas Agustus 2025; diolah oleh peneliti</div>
  </div>

  <script>
    const eduSegments = [
      { label: "Perguruan Tinggi", value: 0.78, color: "#f3b634" },
      { label: "SMA / Sederajat", value: 9.4, color: "#f1a224" },
      { label: "SMP / Sederajat", value: 6.5, color: "#8154f6" },
      { label: "SD / Kebawah", value: 13.9, color: "#5e2fcf" }
    ];

    const genSegments = [
      { label: "Gen Z", value: 7.8, color: "#7043f6" },
      { label: "Non-Gen Z", value: 22.7, color: "#421f9e" }
    ];

    const traces = [];

    eduSegments.forEach((seg) => {
      traces.push({
        type: "bar",
        x: ["Komposisi Pendidikan"],
        y: [seg.value],
        name: seg.label,
        marker: {
          color: seg.color,
          line: { color: "rgba(255,255,255,0.7)", width: 1.5 }
        },
        hovertemplate: `${seg.label}<br>%{y:.2f} juta jiwa<extra></extra>`
      });
    });

    genSegments.forEach((seg) => {
      traces.push({
        type: "bar",
        x: ["Komposisi Generasi"],
        y: [seg.value],
        name: seg.label,
        marker: {
          color: seg.color,
          line: { color: "rgba(255,255,255,0.6)", width: 1.5 }
        },
        hovertemplate: `${seg.label}<br>%{y:.2f} juta jiwa<extra></extra>`
      });
    });

    const annotations = [];
    let cumulative = 0;
    eduSegments.forEach((seg) => {
      const center = cumulative + seg.value / 2;
      annotations.push({
        x: "Komposisi Pendidikan",
        y: center,
        text: `<span style="font-weight:700; font-size:14px; color:#2f1d63">${seg.value.toFixed(2).replace('.', ',')} Jt</span><br><span style="font-size:12px; font-weight:600; color:#442f8f">${seg.label}</span>`,
        showarrow: false,
        align: "center",
        xanchor: "center",
        yanchor: "middle",
        bgcolor: "rgba(255,255,255,0.92)",
        bordercolor: "rgba(94,63,195,0.45)",
        borderwidth: 1,
        borderpad: 6,
        yshift: 0
      });
      cumulative += seg.value;
    });

    let cumulativeGen = 0;
    genSegments.forEach((seg) => {
      const center = cumulativeGen + seg.value / 2;
      annotations.push({
        x: "Komposisi Generasi",
        y: center,
        text: `<span style=\"font-weight:700; font-size:14px; color:#2f1d63\">${seg.value.toFixed(2).replace('.', ',')} Jt</span><br><span style=\"font-size:12px; font-weight:600; color:#442f8f\">${seg.label}</span>`,
        showarrow: false,
        align: "center",
        xanchor: "center",
        yanchor: "middle",
        bgcolor: "rgba(255,255,255,0.92)",
        bordercolor: "rgba(94,63,195,0.4)",
        borderwidth: 1,
        borderpad: 6
      });
      cumulativeGen += seg.value;
    });

    const layout = {
      barmode: "stack",
      margin: { t: 16, r: 32, b: 64, l: 56, pad: 6 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor: "rgba(0,0,0,0)",
      font: { family: "Manrope", color: "rgba(43,35,89,0.85)" },
      showlegend: false,
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47, 33, 92, 0.92)",
        bordercolor: "transparent"
      },
      xaxis: {
        tickfont: { size: 13, color: "rgba(47,36,95,0.78)", family: "Manrope" },
        gridcolor: "rgba(55,32,109,0.08)",
        categoryorder: "array",
        categoryarray: ["Komposisi Pendidikan", "Komposisi Generasi"]
      },
      yaxis: {
        range: [0, 35],
        dtick: 5,
        tickfont: { size: 12, color: "rgba(47,36,95,0.7)", family: "Manrope" },
        gridcolor: "rgba(55,32,109,0.12)",
        ticksuffix: ""
      },
      annotations
    };

    Plotly.newPlot("plotly-g19", traces, layout, { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
