<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabel 2 - Kekayaan Fraksi DPR RI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-main: #5526b5;
      --purple-deep: #37187c;
      --purple-soft: #6b3bd4;
      --purple-bg: rgba(104, 70, 197, 0.12);
      --yellow-badge: #f5d66d;
      --text-on-purple: #ffffff;
      --text-dark: #221849;
      --card-radius: 26px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f6f4ff;
      color: var(--text-dark);
      padding: 48px 24px 64px;
    }

    .infographic {
      position: relative;
      max-width: min(1180px, 100%);
      margin: 0 auto;
      background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(217,209,255,0.64));
      border-radius: 36px;
      padding: 48px 60px 72px;
      overflow: hidden;
      box-shadow: 0 24px 56px rgba(60, 34, 115, 0.16);
    }

    .infographic::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 12% 18%, rgba(126, 96, 214, 0.25), transparent 55%),
                  radial-gradient(circle at 92% 72%, rgba(111, 83, 210, 0.28), transparent 60%);
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chart-title {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .chart-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      background: var(--purple-main);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      border-radius: 10px;
      letter-spacing: 0.02em;
    }

    .chart-heading {
      margin: 0;
      font-size: clamp(22px, 3.1vw, 32px);
      font-weight: 700;
      color: var(--purple-deep);
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(55, 24, 124, 0.7);
      font-weight: 600;
    }

    .controls {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .filters {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(86, 60, 176, 0.35) transparent;
    }

    .filters::-webkit-scrollbar {
      height: 6px;
    }

    .filters::-webkit-scrollbar-track {
      background: transparent;
    }

    .filters::-webkit-scrollbar-thumb {
      background: rgba(86, 60, 176, 0.35);
      border-radius: 999px;
    }

    .filter-button {
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--purple-deep);
      background: rgba(86, 60, 176, 0.12);
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, box-shadow 180ms ease;
      white-space: nowrap;
    }

    .filter-button:hover {
      background: rgba(86, 60, 176, 0.18);
    }

    .filter-button.is-active {
      background: var(--purple-main);
      color: #fff;
      box-shadow: 0 12px 26px rgba(86, 60, 176, 0.32);
    }

    .legend-band {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      color: rgba(34, 24, 73, 0.78);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--purple-main);
      display: inline-block;
      margin-right: 8px;
    }

    .cards-grid {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .party-card {
      position: relative;
      background: linear-gradient(135deg, var(--purple-main), var(--purple-soft));
      border-radius: var(--card-radius);
      color: var(--text-on-purple);
      padding: 28px 38px 28px 34px;
      display: grid;
      grid-template-columns: minmax(220px, 0.35fr) minmax(280px, 0.4fr) minmax(240px, 0.25fr);
      align-items: stretch;
      column-gap: 32px;
      width: 100%;
      box-shadow: 0 18px 32px rgba(54, 22, 114, 0.32);
      overflow: hidden;
    }

    .party-card::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: calc(var(--card-radius) - 14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .party-header {
      display: flex;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .logo-wrapper {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
      overflow: hidden;
    }

    .logo-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(184,167,255,0.75));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--purple-deep);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .party-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .party-short {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .party-full {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.72;
      font-weight: 600;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .metric {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 92px;
    }

    .metric span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      opacity: 0.72;
    }

    .metric strong {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.01em;
      word-break: break-word;
    }

    .richest {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      padding: 18px 32px 18px 34px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.14);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(4px);
      width: 100%;
      min-width: 260px;
      text-align: right;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(185,167,252,0.65));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--purple-deep);
    }

    .richest-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }

    .richest-name {
      font-size: 14px;
      font-weight: 600;
    }

    .richest-amount {
      font-size: 15px;
      font-weight: 700;
    }

    .source-badge {
      margin-top: 48px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: var(--yellow-badge);
      border-radius: 999px;
      color: var(--text-dark);
      font-size: 13px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 1100px) {
      .party-card {
        grid-template-columns: minmax(200px, 0.38fr) minmax(240px, 0.38fr) minmax(220px, 0.24fr);
        column-gap: 26px;
        padding: 26px 30px 26px 28px;
      }
      .metrics {
        grid-template-columns: repeat(3, minmax(130px, 1fr));
      }
    }

    @media (max-width: 960px) {
      body {
        padding: 32px 16px 48px;
      }
      .infographic {
        padding: 36px 28px 56px;
      }
      .party-card {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 24px 28px;
      }
      .metrics {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 14px;
      }
    }

    @media (max-width: 640px) {
      .infographic {
        border-radius: 30px;
      }
      .party-card {
        padding: 20px;
      }
      .legend-band {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="infographic">
    <header>
      <div class="chart-title">
        <span class="chart-tag">Tabel 2.</span>
        <h1 class="chart-heading">Kekayaan Anggota DPR RI berdasarkan Fraksi Partai Politik</h1>
      </div>
      <p class="subtitle">Rangking fraksi DPR RI berdasarkan total, rata-rata, dan kursi legislatif</p>
    </header>

    <section class="controls">
      <div class="filters" aria-label="Urutkan berdasarkan">
        <button class="filter-button is-active" data-sort="total">Total Kekayaan Legislator</button>
        <button class="filter-button" data-sort="average">Rata-rata Kekayaan</button>
        <button class="filter-button" data-sort="seats">Jumlah Kursi</button>
        <button class="filter-button" data-sort="richest">Kekayaan Individu Tertinggi</button>
      </div>
      <div class="legend-band">
        <span><span class="legend-dot"></span>Data dalam rupiah (Rp) dan kursi DPR RI periode 2024–2029</span>
      </div>
    </section>

    <section class="cards-grid" id="cardsGrid" aria-live="polite"></section>

    <div class="source-badge">
      Sumber: Laporan Harta Kekayaan Penyelenggara Negara (2026), diolah peneliti
    </div>
  </main>

  <script>
    const parties = [
      {
        short: 'Golkar',
        full: 'Partai Golongan Karya',
        total: 5884397902323,
        average: 57130076722,
        seats: 101,
        richestName: 'Hj. Haeny Relawati R.W.',
        richestAmount: 470566738515,
        logo: 'GO'
      },
      {
        short: 'PDI Perjuangan',
        full: 'Partai Demokrasi Indonesia Perjuangan',
        total: 5104144416030,
        average: 47260596445,
        seats: 110,
        richestName: 'Sihar P.H. Sitorus',
        richestAmount: 871188628449,
        logo: 'PD'
      },
      {
        short: 'PKB',
        full: 'Partai Kebangkitan Bangsa',
        total: 4177373698914,
        average: 564267287676,
        seats: 68,
        richestName: 'Rusdi Kirana',
        richestAmount: 2603426732731,
        logo: 'PK'
      },
      {
        short: 'Demokrat',
        full: 'Partai Demokrat',
        total: 3124236656352,
        average: 71005378553,
        seats: 44,
        richestName: 'H. Fadli Zon',
        richestAmount: 1729450074142,
        logo: 'DE'
      },
      {
        short: 'NasDem',
        full: 'Partai NasDem',
        total: 3058526596624,
        average: 44978332303,
        seats: 69,
        richestName: 'Rachmat Gobel',
        richestAmount: 451555266195,
        logo: 'NA'
      },
      {
        short: 'Gerindra',
        full: 'Partai Gerakan Indonesia Raya',
        total: 2902273741524,
        average: 33747369087,
        seats: 86,
        richestName: 'Siti Hediati Soeharto',
        richestAmount: 709567168702,
        logo: 'GE'
      },
      {
        short: 'PKS',
        full: 'Partai Keadilan Sejahtera',
        total: 930570268834,
        average: 17557929601,
        seats: 53,
        richestName: 'Hj. Ledia Hanifa A.',
        richestAmount: 139040533516,
        logo: 'PK'
      },
      {
        short: 'PAN',
        full: 'Partai Amanat Nasional',
        total: 1475844455183,
        average: 30746759483,
        seats: 48,
        richestName: 'H. Eddy Soeparno',
        richestAmount: 249312085502,
        logo: 'PA'
      }
    ];

    const numberFormat = new Intl.NumberFormat('id-ID');

    const sorters = {
      total: (a, b) => b.total - a.total,
      average: (a, b) => b.average - a.average,
      seats: (a, b) => b.seats - a.seats,
      richest: (a, b) => b.richestAmount - a.richestAmount
    };

    const cardsGrid = document.getElementById('cardsGrid');

    function renderCards(data) {
      const fragments = data.map((party) => {
        const initials = party.richestName
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map((name) => name.charAt(0))
          .join('').toUpperCase();

        return `
          <article class="party-card">
            <div class="party-header">
              <div class="logo-wrapper">
                <div class="logo-placeholder">${party.logo}</div>
              </div>
              <div class="party-title">
                <span class="party-short">${party.short}</span>
                <span class="party-full">${party.full}</span>
              </div>
            </div>
            <div class="metrics">
              <div class="metric">
                <span>Total Kekayaan Legislator</span>
                <strong>Rp${numberFormat.format(party.total)}</strong>
              </div>
              <div class="metric">
                <span>Rata-rata Kekayaan</span>
                <strong>Rp${numberFormat.format(party.average)}</strong>
              </div>
              <div class="metric">
                <span>Jumlah Kursi</span>
                <strong>${numberFormat.format(party.seats)}</strong>
              </div>
            </div>
            <div class="richest">
              <div class="avatar" aria-hidden="true">${initials}</div>
              <div class="richest-text">
                <span class="richest-name">${party.richestName}</span>
                <span class="richest-amount">Rp${numberFormat.format(party.richestAmount)}</span>
              </div>
            </div>
          </article>
        `;
      }).join('');

      cardsGrid.innerHTML = fragments;
    }

    function setActiveButton(key) {
      document.querySelectorAll('.filter-button').forEach((button) => {
        button.classList.toggle('is-active', button.dataset.sort === key);
      });
    }

    function sortAndRender(key) {
      const sorted = [...parties].sort(sorters[key] || sorters.total);
      renderCards(sorted);
      setActiveButton(key);
    }

    document.querySelectorAll('.filter-button').forEach((button) => {
      button.addEventListener('click', () => {
        const key = button.dataset.sort;
        sortAndRender(key);
      });
    });

    // Initial render
    sortAndRender('total');
  </script>
</body>
</html>
