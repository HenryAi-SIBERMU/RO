<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 32 — Banyak Perempuan Putus Asa Mencari Kerja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root {
      --purple: #5d3fd3;
      --deep-purple: #37206d;
      --card-border: rgba(70, 48, 138, 0.2);
      --lavender: rgba(248, 246, 255, 0.96);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      font-family: "Manrope", system-ui, sans-serif;
      background: radial-gradient(circle at 14% 18%, rgba(93,63,211,0.12), transparent 55%),
                  radial-gradient(circle at 86% 12%, rgba(242,181,68,0.12), transparent 60%),
                  #f7f4ff;
    }
    .card {
      width: min(980px, 96vw);
      background: #fff;
      border-radius: 26px;
      border: 1px solid var(--card-border);
      box-shadow: 0 32px 70px -34px rgba(40,26,84,0.35);
      padding: 40px 44px 48px;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(93,63,211,0.06), transparent 45%),
                  linear-gradient(315deg, rgba(242,181,68,0.05), transparent 58%);
      pointer-events: none;
    }
    header {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }
    .badge {
      background: var(--purple);
      color: #fff;
      padding: 11px 30px;
      border-radius: 0 18px 18px 0;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 18px 28px -16px rgba(93,63,211,0.65);
      margin-left: -44px;
    }
    h1 {
      margin: 0;
      font-size: clamp(17px, 2.1vw, 25px);
      color: var(--deep-purple);
      font-weight: 800;
      line-height: 1.25;
    }
    .plot-wrap {
      background: var(--lavender);
      border-radius: 22px;
      padding: 24px 28px 32px;
      border: 1px solid rgba(93,63,211,0.15);
      position: relative;
      z-index: 1;
    }
    #plotly-g32 { width: 100%; height: 460px; }
    .legend-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--deep-purple);
    }
    .legend-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .source {
      margin-top: 26px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #513c86;
      background: #fcefd5;
      border-radius: 16px;
      padding: 14px 18px;
      border: 1px solid rgba(240,193,95,0.45);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 900px) {
      .card { padding: 32px 20px 36px; }
      .badge { margin-left: -20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 32.</div>
      <h1>Banyak Perempuan Putus Asa Mencari Kerja</h1>
    </header>

    <div class="plot-wrap">
      <div id="plotly-g32"></div>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-dot" style="background:#5d3fd3;"></div>
          Belum Menikah
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f0ab00;"></div>
          Menikah
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#aaa8c0;"></div>
          Cerai
        </div>
      </div>
    </div>

    <div class="source">Sumber: Sakernas Agustus 2025, diolah oleh peneliti</div>
  </div>

  <script>
    const ages = ["15-20", "21-30", "31-40", "41-50", "51-60", "61-65"];

    const belumMenikah = [30.99, 46.33, 11.04,  3.51,  5.61,  2.52];
    const menikah      = [ 1.26, 11.08, 21.99, 28.84, 27.54,  9.29];
    const cerai        = [ 0.04,  2.61,  6.93, 19.61, 40.93, 29.88];

    const traceBelum = {
      type: "bar",
      name: "Belum Menikah",
      x: ages,
      y: belumMenikah,
      marker: { color: "#5d3fd3", line: { color: "rgba(255,255,255,0.4)", width: 1 } },
      text: belumMenikah.map(v => v.toFixed(2)),
      textposition: "inside",
      insidetextanchor: "middle",
      textfont: { family: "Manrope", size: 12, color: "#fff" },
      hovertemplate: "%{x} — Belum Menikah<br><b>%{y:.2f}%</b><extra></extra>",
      showlegend: false
    };

    const traceMenikah = {
      type: "bar",
      name: "Menikah",
      x: ages,
      y: menikah,
      marker: { color: "#f0ab00", line: { color: "rgba(255,255,255,0.4)", width: 1 } },
      text: menikah.map(v => v.toFixed(2)),
      textposition: "inside",
      insidetextanchor: "middle",
      textfont: { family: "Manrope", size: 12, color: "#fff" },
      hovertemplate: "%{x} — Menikah<br><b>%{y:.2f}%</b><extra></extra>",
      showlegend: false
    };

    const traceCerai = {
      type: "bar",
      name: "Cerai",
      x: ages,
      y: cerai,
      marker: { color: "#aaa8c0", line: { color: "rgba(255,255,255,0.4)", width: 1 } },
      text: cerai.map(v => v.toFixed(2)),
      textposition: "inside",
      insidetextanchor: "middle",
      textfont: { family: "Manrope", size: 12, color: "#37206d" },
      hovertemplate: "%{x} — Cerai<br><b>%{y:.2f}%</b><extra></extra>",
      showlegend: false
    };

    const layout = {
      barmode: "stack",
      bargap: 0.35,
      margin: { t: 20, r: 24, b: 60, l: 55, pad: 4 },
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor:  "rgba(0,0,0,0)",
      font: { family: "Manrope" },
      showlegend: false,
      xaxis: {
        tickfont: { size: 13, color: "rgba(47,36,95,0.85)" },
        gridcolor: "rgba(0,0,0,0)"
      },
      yaxis: {
        range: [0, 82],
        dtick: 20,
        tickfont: { size: 12, color: "rgba(47,36,95,0.7)" },
        gridcolor: "rgba(93,63,211,0.10)",
        zeroline: true,
        zerolinecolor: "rgba(93,63,211,0.2)",
        zerolinewidth: 1
      },
      hoverlabel: {
        font: { family: "Manrope", size: 12, color: "#fff" },
        bgcolor: "rgba(47,33,92,0.92)",
        bordercolor: "transparent"
      }
    };

    Plotly.newPlot("plotly-g32", [traceBelum, traceMenikah, traceCerai], layout,
      { displayModeBar: false, responsive: true });
  </script>
</body>
</html>
