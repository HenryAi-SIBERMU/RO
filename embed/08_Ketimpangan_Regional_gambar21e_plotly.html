<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gambar 21e — Ketersediaan Jaminan Pensiun di Tempat Kerja (Plotly)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    :root { --purple:#5d3fd3; --deep-purple:#37206d; --card-border:rgba(70,48,138,0.2); --lavender:rgba(248,246,255,0.96); }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:28px;
      font-family:"Manrope",system-ui,sans-serif;
      background:radial-gradient(circle at 14% 18%,rgba(93,63,211,0.12),transparent 55%),
                 radial-gradient(circle at 86% 12%,rgba(242,181,68,0.12),transparent 60%),#f7f4ff;
    }
    .card {
      width:min(960px,96vw); background:#fff; border-radius:26px;
      border:1px solid var(--card-border); box-shadow:0 32px 70px -34px rgba(40,26,84,0.35);
      padding:40px 44px 48px; position:relative; overflow:hidden;
    }
    .card::after {
      content:""; position:absolute; inset:0;
      background:linear-gradient(140deg,rgba(93,63,211,0.06),transparent 45%),
                 linear-gradient(315deg,rgba(242,181,68,0.05),transparent 58%);
      pointer-events:none;
    }
    header { position:relative; z-index:1; display:flex; flex-wrap:wrap; align-items:center; gap:20px; margin-bottom:28px; }
    .badge {
      background:var(--purple); color:#fff; padding:11px 30px; border-radius:0 18px 18px 0;
      font-weight:800; letter-spacing:0.04em; box-shadow:0 18px 28px -16px rgba(93,63,211,0.65); margin-left:-44px;
    }
    h1 { margin:0; font-size:clamp(20px,2.5vw,28px); color:var(--deep-purple); font-weight:800; line-height:1.25; }
    .plot-wrap { background:var(--lavender); border-radius:22px; padding:28px 28px 36px; border:1px solid rgba(93,63,211,0.15); }
    #plotly-g21e { width:100%; height:440px; }
    .source {
      margin-top:26px; text-align:center; font-size:13px; font-weight:600; color:#513c86;
      background:#fcefd5; border-radius:16px; padding:14px 18px;
      border:1px solid rgba(240,193,95,0.45); position:relative; z-index:1;
    }
    @media(max-width:900px){ .card{padding:32px 20px 36px;} .badge{margin-left:-20px;} }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <div class="badge">Gambar 21e.</div>
      <h1>Ketersediaan Jaminan Pensiun di Tempat Kerja</h1>
    </header>
    <div class="plot-wrap">
      <div id="plotly-g21e"></div>
    </div>
    <div class="source">Sumber: Sakernas Agustus 2025; diolah oleh peneliti</div>
  </div>

  <script>
    const groups = ["Gen Z (15–17)","Gen Z (18–28)","Gen Y (29–44)","Gen X (45–60)","Baby Boomer (61–79)"];
    const ya        = [0.1,   6.7, 15.5, 19.2,  2.5];
    const tidak     = [99.5, 91.8, 83.6, 80.3, 97.3];
    const tidakTahu = [0.4,   1.4,  0.9,  0.5,  0.3];

    const traces = [
      {
        name:"Ya", type:"bar", x:groups, y:ya,
        marker:{ color:"#6c3fcc", line:{color:"rgba(255,255,255,0.5)",width:1} },
        text:ya.map(v=>v.toFixed(1)), textposition:"outside",
        textfont:{family:"Manrope",size:12,color:"#37206d"},
        hovertemplate:"%{x}<br>Ya: <b>%{y:.1f}%</b><extra></extra>", cliponaxis:false
      },
      {
        name:"Tidak", type:"bar", x:groups, y:tidak,
        marker:{ color:"#f3c15a", line:{color:"rgba(255,255,255,0.5)",width:1} },
        text:tidak.map(v=>v.toFixed(1)), textposition:"outside",
        textfont:{family:"Manrope",size:12,color:"#37206d"},
        hovertemplate:"%{x}<br>Tidak: <b>%{y:.1f}%</b><extra></extra>", cliponaxis:false
      },
      {
        name:"Tidak Tahu", type:"bar", x:groups, y:tidakTahu,
        marker:{ color:"#b8e07a", line:{color:"rgba(255,255,255,0.5)",width:1} },
        text:tidakTahu.map(v=>v.toFixed(1)), textposition:"outside",
        textfont:{family:"Manrope",size:12,color:"#37206d"},
        hovertemplate:"%{x}<br>Tidak Tahu: <b>%{y:.1f}%</b><extra></extra>", cliponaxis:false
      }
    ];

    const layout = {
      barmode:"group", bargap:0.22, bargroupgap:0.06,
      margin:{t:20,r:30,b:80,l:70,pad:4},
      paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:"rgba(0,0,0,0)",
      font:{family:"Manrope"},
      legend:{
        orientation:"h", x:0.5, xanchor:"center", y:-0.2,
        font:{family:"Manrope",size:13,color:"#37206d"},
        bgcolor:"rgba(255,255,255,0.85)", bordercolor:"rgba(93,63,211,0.2)", borderwidth:1
      },
      xaxis:{ tickfont:{size:13,color:"rgba(47,36,95,0.85)",family:"Manrope"}, gridcolor:"rgba(0,0,0,0)" },
      yaxis:{
        range:[0,110], dtick:20,
        title:{text:"Persentase (%)",font:{size:12,color:"rgba(47,36,95,0.65)"}},
        tickfont:{size:12,color:"rgba(47,36,95,0.7)",family:"Manrope"},
        gridcolor:"rgba(55,32,109,0.1)"
      },
      hoverlabel:{ font:{family:"Manrope",size:12,color:"#fff"}, bgcolor:"rgba(47,33,92,0.92)", bordercolor:"transparent" }
    };

    Plotly.newPlot("plotly-g21e", traces, layout, {displayModeBar:false, responsive:true});
  </script>
</body>
</html>
