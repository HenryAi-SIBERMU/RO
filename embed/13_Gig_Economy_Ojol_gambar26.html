<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambar 26 — Siklus Kehidupan Pengemudi Ojol</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background: transparent;
    padding: 28px 24px 24px;
    color: #fff;
  }

  .wrapper { max-width: 900px; margin: 0 auto; }

  .tag {
    color: #a78bfa;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 28px;
  }

  /* ──────────────────────────────────
     7-column cycle grid
     cols: card | arr | card | arr | card | arr | card
     rows: top-row | connector | bottom-row
  ────────────────────────────────── */
  .cycle {
    display: grid;
    grid-template-columns: 1fr 40px 1fr 40px 1fr 40px 1fr;
    grid-template-rows: auto 56px auto;
    align-items: center;
  }

  /* Cards */
  .card {
    background: #7c3aed;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 20px 12px 16px;
    text-align: center;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-height: 152px;
    justify-content: flex-start;
    cursor: default;
    transition: transform 0.25s, background 0.25s, border-color 0.25s, box-shadow 0.25s;
  }

  .card:hover {
    transform: scale(1.05) translateY(-4px);
    background: #6d28d9;
    border-color: #FBBF24;
    box-shadow: 0 10px 36px rgba(109, 40, 217, 0.5), 0 0 0 1px rgba(251, 191, 36, 0.25);
    z-index: 5;
  }

  /* Step badge */
  .badge {
    position: absolute;
    top: 9px; left: 10px;
    background: #FBBF24;
    color: #1a0a3c;
    font-size: 10px;
    font-weight: 800;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon { font-size: 44px; line-height: 1; }

  .label {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.35;
    color: #fff;
  }

  /* Yellow circle arrows */
  .arr {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .arr-circle {
    width: 34px; height: 34px;
    background: #FBBF24;
    color: #1a0a3c;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 900;
    box-shadow: 0 4px 14px rgba(251, 191, 36, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: default;
    flex-shrink: 0;
  }

  .arr-circle:hover {
    transform: scale(1.2);
    box-shadow: 0 6px 22px rgba(251, 191, 36, 0.65);
  }

  /* Source */
  .source-box {
    background: #fef9c3;
    border-radius: 12px;
    padding: 10px 20px;
    margin-top: 24px;
    text-align: center;
    color: #713f12;
    font-size: 12px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="tag">Gambar 26 — Hal. 47 &nbsp;·&nbsp; Gig Economy &amp; Ojol</div>
  <h1>Siklus Kehidupan Pengemudi Ojol</h1>

  <div class="cycle">

    <!-- ═══ ROW 1: 4 cards + 3 right arrows ═══ -->

    <div class="card">
      <span class="badge">1</span>
      <span class="icon">🛵</span>
      <span class="label">Kerja Panjang</span>
    </div>

    <div class="arr"><div class="arr-circle">&#10148;</div></div>

    <div class="card">
      <span class="badge">2</span>
      <span class="icon">📉</span>
      <span class="label">Pendapatan Rendah</span>
    </div>

    <div class="arr"><div class="arr-circle">&#10148;</div></div>

    <div class="card">
      <span class="badge">3</span>
      <span class="icon">🐷</span>
      <span class="label">Tidak Bisa Menabung</span>
    </div>

    <div class="arr"><div class="arr-circle">&#10148;</div></div>

    <div class="card">
      <span class="badge">4</span>
      <span class="icon">👴</span>
      <span class="label">Tidak Ada Pensiun</span>
    </div>

    <!-- ═══ ROW 2: connector (down arrow at col 7) ═══ -->

    <div></div><!-- col 1 -->
    <div></div><!-- col 2 -->
    <div></div><!-- col 3 -->
    <div></div><!-- col 4 -->
    <div></div><!-- col 5 -->
    <div></div><!-- col 6 -->
    <div class="arr"><div class="arr-circle">&#11015;</div></div><!-- col 7 -->

    <!-- ═══ ROW 3: right-to-left flow (step5 → step6 → step7) ═══
         Layout order left-to-right: 7 | ← | 6 | ← | 5 | empty | empty
         Arrows point LEFT because flow travels from col-5 toward col-1 -->

    <div class="card">
      <span class="badge">7</span>
      <span class="icon">🧓</span>
      <span class="label">Kemiskinan Lansia</span>
    </div>

    <div class="arr"><div class="arr-circle" style="transform:scaleX(-1)">&#10148;</div></div>

    <div class="card">
      <span class="badge">6</span>
      <span class="icon">💸</span>
      <span class="label">Pendapatan Nol</span>
    </div>

    <div class="arr"><div class="arr-circle" style="transform:scaleX(-1)">&#10148;</div></div>

    <div class="card">
      <span class="badge">5</span>
      <span class="icon">🧥</span>
      <span class="label">Berhenti Kerja</span>
    </div>

    <div></div><!-- col 6 -->
    <div></div><!-- col 7 -->

  </div>

  <div class="source-box">
    Sumber: Ilustrasi CELIOS berdasarkan temuan lapangan, 2026
  </div>

</div>
</body>
</html>
