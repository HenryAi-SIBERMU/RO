<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambar 26 — Siklus Kehidupan Pengemudi Ojol</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6ff;
    --purple: #7c3aed;
    --purple-dark: #4c1d95;
    --purple-light: #a855f7;
    --text: #24144b;
    --yellow: #fbbf24;
    --card-width: 185px;
    --arrow-gap: 46px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background:
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(0deg, rgba(124,58,237,0.03) 1px, transparent 1px),
      var(--bg);
    background-size: 140px 140px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px 24px 40px;
    color: var(--text);
  }

  .wrapper {
    width: min(940px, 100%);
    background: #ffffff;
    border-radius: 32px;
    padding: 44px 54px 48px;
    position: relative;
    box-shadow: 0 36px 120px -48px rgba(28, 17, 63, 0.55);
    overflow: hidden;
  }

  .wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(220px 180px at 90% 12%, rgba(124,58,237,0.10), transparent 70%),
      radial-gradient(260px 180px at 12% 82%, rgba(76,29,149,0.12), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .meta {
    position: relative;
    z-index: 1;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--purple);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .badge {
    background: var(--purple);
    color: #fff;
    padding: 12px 30px;
    border-radius: 0 22px 22px 0;
    font-weight: 800;
    letter-spacing: 0.06em;
    box-shadow: 0 24px 34px -22px rgba(92, 57, 204, 0.7);
  }

  h1 {
    font-size: clamp(22px, 2.4vw, 30px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.25;
  }

  .diagram {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(4, var(--card-width));
    column-gap: var(--arrow-gap);
    row-gap: 96px;
    justify-content: center;
    margin: 0 auto 40px;
  }

  .card {
    width: var(--card-width);
    background: var(--purple);
    border-radius: 26px;
    padding: 20px 18px 24px;
    box-shadow: 0 22px 46px -24px rgba(76, 29, 149, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    color: #fff;
    position: relative;
    isolation: isolate;
  }

  .card::after,
  .card::before { pointer-events: none; }

  .art {
    width: 100%;
    height: 120px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .art::before {
    content: '';
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.28), transparent 72%);
    top: -70px;
    right: -60px;
    opacity: 0.8;
  }

  .art svg {
    width: 138px;
    height: 102px;
    position: relative;
    z-index: 1;
  }

  .card .caption {
    font-size: 15px;
    font-weight: 800;
    line-height: 1.35;
    letter-spacing: 0.01em;
  }

  .step-1 { grid-column: 1; grid-row: 1; }
  .step-2 { grid-column: 2; grid-row: 1; }
  .step-3 { grid-column: 3; grid-row: 1; }
  .step-4 { grid-column: 4; grid-row: 1; }
  .step-5 { grid-column: 2; grid-row: 2; }
  .step-6 { grid-column: 3; grid-row: 2; }
  .step-7 { grid-column: 4; grid-row: 2; }

  .step-1 .art { background: linear-gradient(150deg, #a855f7 0%, #5b21b6 100%); }
  .step-2 .art { background: linear-gradient(150deg, #fde047 0%, #7c3aed 100%); }
  .step-3 .art { background: linear-gradient(150deg, #f472b6 0%, #8b5cf6 100%); }
  .step-4 .art { background: linear-gradient(150deg, #c4b5fd 0%, #5b21b6 100%); }
  .step-5 .art { background: linear-gradient(150deg, #fb923c 0%, #7c3aed 100%); }
  .step-6 .art { background: linear-gradient(150deg, #fb923c 0%, #581c87 100%); }
  .step-7 .art { background: linear-gradient(150deg, #34d399 0%, #4c1d95 100%); }

  .arrow-right::after {
    content: "\2192";
    position: absolute;
    top: 50%;
    right: calc(-1 * var(--arrow-gap) + 6px);
    transform: translateY(-50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--yellow);
    color: #422006;
    display: grid;
    place-items: center;
    font-size: 22px;
    font-weight: 900;
    box-shadow: 0 18px 34px -12px rgba(251, 191, 36, 0.55);
  }

  .arrow-left::before {
    content: "\2190";
    position: absolute;
    top: 50%;
    left: calc(-1 * var(--arrow-gap) + 6px);
    transform: translateY(-50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--yellow);
    color: #422006;
    display: grid;
    place-items: center;
    font-size: 22px;
    font-weight: 900;
    box-shadow: 0 18px 34px -12px rgba(251, 191, 36, 0.55);
  }

  .arrow-down::after {
    content: "\2193";
    position: absolute;
    left: 50%;
    bottom: -62px;
    transform: translateX(-50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--yellow);
    color: #422006;
    display: grid;
    place-items: center;
    font-size: 22px;
    font-weight: 900;
    box-shadow: 0 18px 34px -12px rgba(251, 191, 36, 0.55);
  }

  .source {
    position: relative;
    z-index: 1;
    background: #fef3c7;
    color: #713f12;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    border-radius: 16px;
    padding: 14px 22px;
    border: 1px solid rgba(240, 193, 95, 0.45);
  }

  @media (max-width: 930px) {
    :root {
      --card-width: 170px;
      --arrow-gap: 28px;
    }
    .wrapper { padding: 36px 32px 40px; }
    .diagram {
      grid-template-columns: repeat(2, var(--card-width));
      column-gap: 32px;
      row-gap: 54px;
    }
    .arrow-right::after,
    .arrow-left::before,
    .arrow-down::after { display: none; }
  }

  @media (max-width: 620px) {
    :root {
      --card-width: 100%;
      --arrow-gap: 0px;
    }
    .diagram {
      grid-template-columns: 1fr;
      row-gap: 28px;
    }
    .card { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="meta">Gig Economy &amp; Ojol</div>
  <header>
    <span class="badge">Gambar 26.</span>
    <h1>Siklus Kehidupan Pengemudi Ojol</h1>
  </header>

  <div class="diagram">
    <div class="card step-1 arrow-right">

              <stop offset="100%" stop-color="#047857" />

          </defs>
          <rect x="0" y="96" width="160" height="12" fill="#432a92" opacity="0.55" />

          <circle cx="52" cy="96" r="9" fill="#d1d5db" />

          <circle cx="118" cy="96" r="9" fill="#e5e7ff" />

          <path d="M68 88h12c0 4-4 8-8 8s-8-4-8-8z" fill="#0f172a" opacity="0.33" />
        </svg>
      </div>
      <div class="caption">Kerja Panjang</div>
    </div>

    <div class="card step-2 arrow-right">
      <div class="art">
        <svg viewBox="0 0 160 120" role="img" aria-labelledby="coinTitle">

          <defs>

            </linearGradient>
          </defs>
          <rect x="0" y="96" width="160" height="12" fill="#432a92" opacity="0.4" />
          <g stroke="#b45309" stroke-width="2">
            <rect x="26" y="42" width="26" height="52" rx="12" fill="url(#coinFill)" />
            <rect x="58" y="50" width="26" height="44" rx="12" fill="url(#coinFill)" />
            <rect x="90" y="60" width="26" height="34" rx="12" fill="url(#coinFill)" />
            <rect x="122" y="68" width="26" height="26" rx="12" fill="url(#coinFill)" />
          </g>
          <circle cx="39" cy="42" r="13" fill="url(#coinFill)" stroke="#b45309" stroke-width="2" />
          <circle cx="71" cy="50" r="13" fill="url(#coinFill)" stroke="#b45309" stroke-width="2" />
          <circle cx="103" cy="60" r="13" fill="url(#coinFill)" stroke="#b45309" stroke-width="2" />
          <circle cx="135" cy="68" r="13" fill="url(#coinFill)" stroke="#b45309" stroke-width="2" />
          <polyline points="24,38 56,22 92,48 124,32 144,58" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
          <polygon points="144,58 134,54 140,66" fill="#f97316" />
        </svg>
      </div>
      <div class="caption">Pendapatan Rendah</div>
    </div>

    <div class="card step-3 arrow-right">
      <div class="art">
        <svg viewBox="0 0 160 120" role="img" aria-labelledby="pigTitle">
          <title id="pigTitle">Tidak bisa menabung</title>
          <defs>
            <linearGradient id="pigBody" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f9a8d4" />
              <stop offset="100%" stop-color="#f472b6" />
            </linearGradient>
          </defs>
          <rect x="0" y="100" width="160" height="8" fill="#432a92" opacity="0.3" />

          <circle cx="116" cy="52" r="2" fill="#fff" />

          <path d="M52 52l-10 14" stroke="#be185d" stroke-width="4" stroke-linecap="round" />
          <path d="M62 46l-8 10" stroke="#be185d" stroke-width="3" stroke-linecap="round" />
          <path d="M102 38l-8 12" stroke="#be185d" stroke-width="3" stroke-linecap="round" />
          <circle cx="90" cy="58" r="4" fill="#111827" />
          <rect x="68" y="92" width="12" height="16" rx="4" fill="#be185d" />
          <rect x="92" y="92" width="12" height="16" rx="4" fill="#be185d" />
          <path d="M132 62c8 2 8 10 0 12" stroke="#be185d" stroke-width="3" stroke-linecap="round" />
        </svg>
      </div>
      <div class="caption">Tidak Bisa Menabung</div>
    </div>

    <div class="card step-4 arrow-down">
      <div class="art">
        <svg viewBox="0 0 160 120" role="img" aria-labelledby="shockTitle">

          <rect x="0" y="100" width="160" height="8" fill="#432a92" opacity="0.3" />
          <path d="M116 92c0 10-8 18-18 18s-18-8-18-18 8-18 18-18 18 8 18 18z" fill="rgba(15,23,42,0.08)" />
          <circle cx="92" cy="40" r="12" fill="#f8d5b6" />
          <path d="M86 34c2-6 8-10 14-9 6 1 10 6 10 12l-2 8h-14z" fill="#fde68a" />
          <path d="M98 60l12 8-6 34h-20l-6-32 8-12z" fill="#16a34a" />

          <text x="128" y="50" font-family="Manrope, sans-serif" font-size="12" font-weight="800" fill="#0f172a" text-anchor="middle">!</text>

          <circle cx="96" cy="38" r="2" fill="#0f172a" />

          <path d="M74 96c10-8 32-8 42 0" stroke="#475569" stroke-width="4" stroke-linecap="round" />
        </svg>
      </div>
      <div class="caption">Tidak Ada Pensiun</div>
    </div>

    <div class="card step-5">
      <div class="art">
        <svg viewBox="0 0 160 120" role="img" aria-labelledby="elderTitle">
          <title id="elderTitle">Kemiskinan lansia</title>
          <rect x="0" y="100" width="160" height="8" fill="#432a92" opacity="0.35" />
          <circle cx="74" cy="38" r="12" fill="#f8d5b6" />
          <path d="M68 32c2-6 8-10 14-9 6 1 10 6 10 12l-4 8h-16z" fill="#fde68a" />
          <path d="M56 60c-8 8-12 22-10 34h24l8-30z" fill="#22c55e" />
          <path d="M86 62l-12 32h24l6-20z" fill="#15803d" />

          <rect x="48" y="64" width="6" height="40" rx="3" fill="#b45309" />
          <circle cx="70" cy="40" r="2" fill="#0f172a" />
          <circle cx="78" cy="40" r="2" fill="#0f172a" />

    <div class="card step-6 arrow-left">

    <div class="card step-7 arrow-left">

        <svg viewBox="0 0 160 120" role="img" aria-labelledby="jacketTitle">

          <defs>
            <linearGradient id="jacketFill" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#34d399" />
              <stop offset="100%" stop-color="#047857" />
            </linearGradient>
          </defs>
          <rect x="0" y="100" width="160" height="8" fill="#432a92" opacity="0.35" />

          <circle cx="80" cy="64" r="4" fill="#ecfeff" />
        </svg>
      </div>
      <div class="caption">Berhenti Kerja</div>
    </div>
  </div>

  <div class="source">Sumber: Ilustrasi CELIOS berdasarkan temuan lapangan, 2026</div>
</div>
</body>
</html>
